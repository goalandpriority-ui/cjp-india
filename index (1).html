  'rent-vs-buy-calculator': {
    what: `A Rent vs Buy Calculator compares the total financial cost of renting versus buying over a set period. It considers mortgage payments, down payment opportunity cost, maintenance (1% of home/year), and total rent paid to help you make a data-driven decision.`,
    formula: `Buying Cost = Down Payment + (Mortgage × Months) + Maintenance (1%/yr)\n\nRenting Cost = Monthly Rent × Months\n\nSavings = |Buying Cost − Renting Cost|\nBetter option = Lower total cost`,
    benefits: ['Make data-driven rent vs buy decision','Understand break-even point for buying','Account for hidden homeownership costs','Compare for any time horizon you choose','Essential before any major housing decision'],
    faqs: [
      { q: 'Is buying always better than renting?', a: 'Not necessarily. Buying builds equity but requires high upfront costs, maintenance, and commitment. Renting offers flexibility. Your decision depends on timeline, market, and finances.' },
      { q: 'What is the break-even point?', a: 'When total buying cost equals total renting cost. In most US cities, this is 4–7 years. If you plan to move sooner, renting is often more economical.' },
      { q: 'What hidden costs does buying have?', a: 'Closing costs (2–5% of price), property taxes, homeowner\'s insurance, HOA fees, maintenance (1–2%/year), and PMI if down payment is under 20%.' },
      { q: 'How does home appreciation affect the calculation?', a: 'This calculator uses purchase cost only. In appreciating markets, buying builds significant equity over time — factoring appreciation makes buying even more favorable long-term.' }
    ]
  },
  'debt-payoff-calculator': {
    what: `A Debt Payoff Calculator creates a clear plan to eliminate your total debt by showing the payoff timeline and total interest cost with your current monthly payment. It works for any installment debt: personal loans, student loans, medical debt, or credit cards.`,
    formula: `Months = −log(1 − Balance × r / Payment) / log(1 + r)\n\nWhere r = Annual Rate ÷ 12 ÷ 100\n\nTotal Interest = (Payment × Months) − Balance\nMinimum viable payment = Balance × r + $1`,
    benefits: ['See your exact debt-free date','Understand total interest cost of your debt','Motivates making extra payments','Helps plan debt avalanche or snowball strategy','Works for any type of installment debt'],
    faqs: [
      { q: 'What is the debt avalanche method?', a: 'Pay minimums on all debts, then put extra money toward the highest-interest debt first. Mathematically optimal — minimizes total interest paid over time.' },
      { q: 'What is the debt snowball method?', a: 'Pay minimums on all debts, then focus extra money on the smallest balance first. Less optimal mathematically but psychologically motivating due to quick early wins.' },
      { q: 'How much extra should I pay to get debt-free faster?', a: 'Even $50–100 extra per month can cut years off your debt. Increase the payment amount in this calculator to see the dramatic effect on your payoff date.' },
      { q: 'Should I pay off debt or invest?', a: 'If debt rate > expected investment return: pay debt first. If rate is low (3–4% student loan) and you can earn 7–10% investing: consider doing both simultaneously.' }
    ]
  },
  'salary-to-hourly-calculator': {
    what: `A Salary to Hourly Calculator converts your annual salary to an equivalent hourly rate, and also shows daily, weekly, and monthly breakdowns. It's useful for comparing job offers, setting freelance rates, or understanding the true per-hour value of your salaried job.`,
    formula: `Hourly Rate = Annual Salary / (Hours per Week × Weeks per Year)\n\nDaily = Hourly × 8 hours\nWeekly = Hourly × Hours per Week\nMonthly = Annual Salary / 12`,
    benefits: ['Compare salaried vs hourly job offers fairly','Set freelance rates based on salary equivalent','Understand your true per-hour value','Useful for overtime and part-time calculations','Helps negotiate salary and contractor rates'],
    faqs: [
      { q: 'How many working hours are in a year?', a: 'Standard full-time is 2,080 hours (40 hrs × 52 weeks). After paid holidays and vacation (10–15 days), actual worked hours are closer to 1,920–2,000.' },
      { q: 'Should I use 52 or 50 weeks?', a: 'Use 52 weeks for the standard calculation. Some prefer 50 weeks to reflect 2 weeks of vacation, which gives a slightly higher hourly rate representing actual hours worked.' },
      { q: 'How do I set a fair freelance rate?', a: 'Take your equivalent hourly salary, then multiply 1.5–2x to account for: no employer benefits, self-employment tax (15.3%), unpaid time between projects, and business expenses.' },
      { q: 'What does federal minimum wage equal annually?', a: 'US federal minimum wage of $7.25/hr = ~$15,080/year at 40 hrs/week. Many states are higher — California and New York are at $16–17/hr = ~$33,000–35,000/year.' }
    ]
  },
  '401-k-calculator': {
    what: `A 401(k) Calculator projects how much your tax-deferred retirement savings will grow based on your contributions, employer match, annual return, and years to retirement. The 401(k) is the most powerful employer-sponsored retirement savings vehicle in the US.`,
    formula: `Balance = Starting Balance × (1+r)ⁿ\n+ Monthly Contribution × [(1+r)ⁿ − 1] / r\n\nWhere:\nr = Monthly return (Annual ÷ 12 ÷ 100)\nn = Months until retirement\nContribution = Your amount + Employer Match`,
    benefits: ['See the power of compounding over decades','Understand employer match as instant 50–100% return','Plan contributions to hit your retirement number','Visualize how return rate affects final balance','Motivates consistent, long-term saving discipline'],
    faqs: [
      { q: 'How much should I contribute to my 401(k)?', a: 'At minimum, contribute enough to get the full employer match — that\'s an instant 50–100% return. Beyond that, aim for 15% of gross income including the match.' },
      { q: 'What is the 2025 401(k) contribution limit?', a: 'For 2025, the employee limit is $23,500/year. If you\'re 50+, there\'s a $7,500 catch-up contribution allowed, totaling $31,000/year.' },
      { q: 'What is an employer match?', a: 'Employers often match 50–100% of your contribution up to a % of salary (e.g., "50% match up to 6% of salary"). Always contribute enough to capture the full match — it\'s free money.' },
      { q: 'Can I withdraw from my 401(k) early?', a: 'Early withdrawals (before age 59½) incur a 10% penalty plus ordinary income taxes. This can reduce your withdrawal by 30–40%, dramatically impacting long-term growth.' }
    ]
  },
  'roth-ira-calculator': {
    what: `A Roth IRA Calculator projects your tax-free retirement savings growth. Unlike traditional IRAs, Roth contributions use after-tax dollars — but all growth and qualified withdrawals in retirement are completely tax-free, making it one of the most powerful long-term wealth-building tools available.`,
    formula: `Balance = (Starting Balance + Annual Contribution) × (1 + r)^Years\n(Compounded annually)\n\nTax Savings Estimate = Growth × 22% tax rate\nTotal Contributed = Annual Contribution × Years`,
    benefits: ['Tax-free growth — pay no tax on gains ever','Tax-free withdrawals throughout retirement','No Required Minimum Distributions (RMDs)','Contributions (not earnings) withdrawable anytime','Ideal for young earners in lower tax brackets now'],
    faqs: [
      { q: 'What is the 2025 Roth IRA contribution limit?', a: 'For 2025, the limit is $7,000/year ($8,000 if age 50+). Income limits apply: phase-out begins at $150K single / $236K married filing jointly.' },
      { q: 'Roth IRA vs Traditional IRA — which is better?', a: 'Roth is better if you expect higher taxes in retirement. Traditional is better if you\'re in a high bracket now. Young earners in lower brackets almost always benefit more from Roth.' },
      { q: 'Can I have both a 401(k) and Roth IRA?', a: 'Yes! You can contribute to both simultaneously. Maxing both means up to $30,500 in tax-advantaged retirement savings in 2025. Highly recommended for serious savers.' },
      { q: 'When can I withdraw Roth IRA earnings tax-free?', a: 'Earnings are tax and penalty-free after age 59½ if the account has been open at least 5 years. Contributions (not earnings) can be withdrawn anytime without penalty.' }
    ]
  },
  'net-worth-calculator': {
    what: `Net Worth is the total value of everything you own minus everything you owe. It is the single most important number to track your financial health. A positive and growing net worth means you are building wealth. Tracking it monthly helps you make smarter money decisions and stay on track toward financial freedom.`,
    formula: `Net Worth = Total Assets − Total Liabilities\n\nAssets: Cash + Investments + Real Estate + Vehicles + Other\nLiabilities: Mortgage + Car Loans + Credit Cards + Other Debts\n\nAsset-to-Debt Ratio = Total Assets ÷ Total Liabilities`,
    benefits: ['Clear snapshot of your true financial health','Track wealth-building progress over time','Identify areas to cut debt or grow assets','Set realistic financial goals and timelines','Motivates better spending and saving habits'],
    faqs: [
      { q: 'What is a good net worth at 30?', a: 'A common benchmark is 1× your annual salary by age 30. But any positive net worth is a great start — focus on the upward trend, not comparisons to others.' },
      { q: 'Should I include my home in net worth?', a: 'Yes — include current market value as an asset and remaining mortgage as a liability. The equity (value minus mortgage) is your real contribution to net worth.' },
      { q: 'How often should I calculate my net worth?', a: 'Once a month or once a quarter is ideal. This helps you track progress, catch debt creep, and stay motivated toward financial goals.' },
      { q: 'Does net worth include retirement accounts?', a: 'Yes! 401k, Roth IRA, and pension values should be included in your assets. They are often your largest long-term wealth component.' }
    ]
  },
  'investment-return-calculator': {
    what: `An Investment Return Calculator measures how much your investment has grown over time. It calculates total return and the annualized CAGR, which lets you compare investments across different time periods on a fair, like-for-like basis. Dividends are also factored in for a complete total return picture.`,
    formula: `Total Return % = (Final Value − Initial Value) ÷ Initial Value × 100\n\nCAGR = (Final Value ÷ Initial Value)^(1 ÷ Years) − 1\n\nTotal Return with Dividends = Capital Gain + All Dividend Payments`,
    benefits: ['Compare returns across different investment types','Understand real annualized performance via CAGR','Factor in dividend income for total return','Make data-driven reinvestment decisions','Evaluate fund manager performance fairly'],
    faqs: [
      { q: 'What is a good annual investment return?', a: 'Historically, the US stock market returns ~10% annually. For a diversified portfolio, 7–9% real returns are considered strong. Risk-free instruments like bonds return 3–5%.' },
      { q: 'What is the difference between ROI and CAGR?', a: 'ROI shows total percentage gain regardless of time. CAGR annualizes the growth rate, making it useful to compare a 3-year investment with a 10-year one on equal footing.' },
      { q: 'Should dividends be reinvested?', a: 'Yes — reinvesting dividends dramatically amplifies compounding. Over 20+ years, dividends can account for 40–50% of total stock market returns.' },
      { q: 'How do I account for inflation in returns?', a: 'Subtract the inflation rate from your nominal return to get real return. A 10% nominal return with 3% inflation gives a ~7% real return in purchasing power.' }
    ]
  },
  'break-even-calculator': {
    what: `A Break-Even Calculator tells you exactly how many units you need to sell to cover all your costs. Below break-even you lose money, above it you make profit. It is an essential tool for any business or product launch decision, and a key metric investors look for when evaluating a business.`,
    formula: `Break-Even Units = Fixed Costs ÷ Contribution Margin\nContribution Margin = Price Per Unit − Variable Cost Per Unit\nContribution Margin Ratio = CM ÷ Price × 100\nBreak-Even Revenue = Fixed Costs ÷ CM Ratio`,
    benefits: ['Know exactly when your business becomes profitable','Test pricing strategies before committing','Plan production and sales targets confidently','Identify cost reduction opportunities','Essential for investor pitch and business planning'],
    faqs: [
      { q: 'What are fixed costs vs variable costs?', a: 'Fixed costs stay the same regardless of output (rent, salaries, insurance). Variable costs change with each unit produced (materials, packaging, shipping, commissions).' },
      { q: 'How can I lower my break-even point?', a: 'Raise your selling price, reduce variable cost per unit by negotiating supplier deals, or cut fixed costs. Ideally do all three simultaneously.' },
      { q: 'What is a good contribution margin?', a: 'SaaS: 70–90%. Manufacturing: 30–50%. Retail: 20–40%. Higher margin means more profit per sale and a lower break-even point.' },
      { q: 'Does break-even include my own salary?', a: 'If you pay yourself, yes — include it in fixed costs. Always include all real costs for an accurate picture of your true break-even.' }
    ]
  },
  'vat-calculator': {
    what: `VAT (Value Added Tax) is a consumption tax applied at each stage of the supply chain in countries including the UK, EU, Australia, and Canada. Unlike US sales tax, VAT is collected at every stage of production. This calculator handles both adding VAT to a net price and extracting VAT from a gross price.`,
    formula: `Add VAT (Exclusive):\nVAT Amount = Net Price × VAT Rate ÷ 100\nGross Price = Net Price + VAT Amount\n\nRemove VAT (Inclusive):\nNet Price = Gross Price ÷ (1 + VAT Rate ÷ 100)\nVAT Amount = Gross Price − Net Price`,
    benefits: ['Instantly calculate price with or without VAT','Works for seller invoicing and buyer verification','Handles all standard VAT rates (5% to 25%)','Avoid under or overcharging on invoices','Essential for cross-border EU business transactions'],
    faqs: [
      { q: 'What countries use VAT?', a: 'Over 160 countries use VAT including all EU member states (standard 20%), UK (20%), Australia GST (10%), Canada GST (5%). The US uses sales tax, not VAT.' },
      { q: 'Can businesses claim VAT back?', a: 'Yes! VAT-registered businesses can reclaim input VAT paid on purchases against output VAT collected on sales. Only the net difference is paid to the government.' },
      { q: 'What is the difference between zero-rated and VAT-exempt?', a: 'Zero-rated goods have 0% VAT but businesses can still claim input VAT. Exempt goods have no VAT and businesses cannot claim input VAT on related costs.' },
      { q: 'When do I need to register for VAT?', a: 'In the UK, you must register when taxable turnover exceeds £90,000/year. In the EU, thresholds vary by country, typically €35,000 to €100,000.' }
    ]
  },
  'sales-tax-calculator': {
    what: `Sales Tax is a consumption tax imposed by US state and local governments on the sale of goods and some services. Rates vary significantly by state, county, and city — making this calculator essential for accurate pricing, e-commerce compliance, and budgeting for purchases across different US states.`,
    formula: `Sales Tax Amount = Item Price × Combined Rate ÷ 100\nTotal Price = Item Price + Sales Tax Amount\nCombined Rate = State Rate + County Rate + City Rate\nEffective Rate = Total Tax ÷ Item Price × 100`,
    benefits: ['Calculate exact sales tax for any US state','Combine state and local tax rates accurately','Price products correctly for each market','Avoid underpaying tax to authorities','Essential for e-commerce multi-state selling'],
    faqs: [
      { q: 'Which US states have no sales tax?', a: 'Five states have no state sales tax: Montana, Oregon, New Hampshire, Delaware, and Alaska. These are popular for large purchases like electronics and vehicles.' },
      { q: 'Is online sales tax required?', a: 'Yes, since the 2018 South Dakota v. Wayfair ruling, online retailers must collect sales tax in states where they have economic nexus — usually $100K in sales or 200 transactions.' },
      { q: 'Which state has the highest combined sales tax?', a: 'Louisiana and Tennessee often top the list with combined state and local rates exceeding 10%. California has the highest state-only rate at 7.25%.' },
      { q: 'Are groceries and medicine taxed?', a: 'Most states exempt prescription drugs. Groceries are exempt in about 30 states, partially taxed in others, and fully taxed in some states like Alabama and Mississippi.' }
    ]
  },
  'auto-loan-calculator': {
    what: `An Auto Loan Calculator helps you understand the true cost of financing a vehicle. It calculates your monthly payment, total interest paid, and the real total cost of ownership — so you can compare dealer financing vs bank loans and make the smartest car-buying decision before stepping into the showroom.`,
    formula: `Loan Amount = Vehicle Price − Down Payment − Trade-In\nMonthly Payment = Loan × r × (1+r)^n ÷ [(1+r)^n − 1]\nr = Annual Rate ÷ 12 ÷ 100 | n = Term in months\nTrue Car Cost = Purchase Price + Total Interest Paid`,
    benefits: ['Know your monthly payment before the dealership','Compare total cost across different loan terms','Understand how down payment affects total interest','Evaluate trade-in impact on financing','Focus on total cost not just monthly payment'],
    faqs: [
      { q: 'What is a good auto loan interest rate?', a: 'In 2025, good credit (700+) typically gets 5–7% for new cars, 7–10% for used. Rates above 15% are considered high — save for a larger down payment first.' },
      { q: 'Should I choose 60 or 72 month loan term?', a: 'Shorter terms mean higher monthly payments but much less total interest. A 60-month loan on $30K at 7% saves ~$3,261 vs a 72-month loan. Avoid 84-month loans if possible.' },
      { q: 'Is it better to put more money down?', a: 'Yes — a larger down payment reduces the loan amount, lowers monthly payments, reduces total interest, and may help qualify for a better rate. Aim for at least 20% down.' },
      { q: 'Can I pay off my auto loan early?', a: 'Most auto loans allow early payoff without penalty. Paying even $50–$100 extra per month can shave months off the loan and save hundreds in interest.' }
    ]
  },
  'body-fat-calculator': {
    what: `Body Fat Percentage is the proportion of your total body weight that is fat tissue. Unlike BMI which only uses height and weight, body fat percentage distinguishes between fat mass and lean mass — giving a much more accurate picture of your health, fitness level, and body composition progress over time.`,
    formula: `Deurenberg Formula (BMI-based):\nBody Fat % = (1.20 × BMI) + (0.23 × Age) − (10.8 × Sex) − 5.4\nSex = 1 for Male, 0 for Female\nBMI = Weight (kg) ÷ Height (m)²\nFat Mass = Weight × Body Fat% ÷ 100`,
    benefits: ['More accurate than BMI for health assessment','Track muscle gain and fat loss separately','Set realistic body composition goals','Monitor fitness progress over time','Identifies health risks linked to high body fat'],
    faqs: [
      { q: 'What is a healthy body fat percentage?', a: 'Men: 8–19% is fit to average. Women: 21–33% is fit to average. Athletes: 6–13% men, 14–20% women. Below 5% men or 10% women is dangerous for health.' },
      { q: 'Is this calculation accurate?', a: 'The Deurenberg formula provides a good estimate within 3–5%. For precise measurement, use DEXA scan, hydrostatic weighing, or skinfold calipers with a trained professional.' },
      { q: 'Can I have normal BMI but high body fat?', a: 'Yes — this is called skinny fat or normal-weight obesity. It is common in people with low muscle mass. This is why body fat percentage is more informative than BMI alone.' },
      { q: 'How quickly can I reduce body fat?', a: 'Safe and sustainable fat loss is 0.5–1% body fat per month. Losing faster risks muscle loss. A 500 kcal daily deficit combined with strength training is most effective.' }
    ]
  },
  'pregnancy-due-date-calculator': {
    what: `A Pregnancy Due Date Calculator estimates your baby's arrival date (EDD) based on the first day of your last menstrual period. Full-term pregnancy is 40 weeks (280 days) from LMP. Only about 5% of babies are born exactly on their due date, but 80% arrive within 2 weeks of the estimated date.`,
    formula: `Due Date = Last Menstrual Period + 280 days\nAdjusted for cycle length: +/- days vs 28-day baseline\nConception Date = LMP + 14 days (ovulation estimate)\nCurrent Week = (Today − LMP) ÷ 7\nTrimester: Wk 1–13 = 1st, Wk 14–27 = 2nd, Wk 28–40 = 3rd`,
    benefits: ['Plan prenatal appointments and checkups','Know your current trimester and fetal development stage','Estimate maternity leave start date','Track important pregnancy milestones','Prepare emotionally and practically for birth'],
    faqs: [
      { q: 'How accurate is the due date calculation?', a: 'The LMP method is accurate within 1–2 weeks for regular cycles. An ultrasound at 8–12 weeks gives a more precise date based on actual fetal measurements.' },
      { q: 'What if my cycle is not 28 days?', a: 'This calculator adjusts for your cycle length. For cycles longer than 28 days, ovulation likely happens later, pushing the due date forward accordingly.' },
      { q: 'What are the key milestones by trimester?', a: '1st trimester (0–13 wk): Heart beats, organs form. 2nd (14–27 wk): Baby moves, gender visible. 3rd (28–40 wk): Rapid growth, lung maturation, baby gets into birth position.' },
      { q: 'What is considered full term?', a: '39–40 weeks is full term. 37–38 weeks is early term. Births at 34–36 weeks are late preterm. Births before 34 weeks are preterm and may require NICU care.' }
    ]
  },
  'ovulation-calculator': {
    what: `An Ovulation Calculator identifies your most fertile days by estimating when you ovulate. Ovulation typically occurs 14 days before your next expected period. The fertile window is 5–6 days around ovulation — knowing this window is key for both conception planning and natural family planning methods.`,
    formula: `Ovulation Day = LMP + (Cycle Length − 14)\nFertile Window = Ovulation Day −5 to Ovulation Day +1\nNext Period = LMP + Cycle Length\n\nSperm survives 3–5 days in the body\nEgg survives approximately 24 hours after ovulation`,
    benefits: ['Maximize chances of natural conception','Understand your cycle and natural fertility','Useful for natural family planning method','Track cycle patterns over multiple months','Identify potential cycle irregularities early'],
    faqs: [
      { q: 'When is the best day to conceive?', a: 'The day of ovulation and the 2–3 days before are the most fertile. Having intercourse every 1–2 days during the 5-day fertile window maximizes conception chances significantly.' },
      { q: 'How do I confirm I am ovulating?', a: 'Use ovulation predictor kits for LH surge, track basal body temperature (rises after ovulation), monitor cervical mucus (egg-white texture at peak fertility), or get a blood progesterone test.' },
      { q: 'Can stress affect ovulation?', a: 'Yes — high stress, dramatic weight changes, intense exercise, illness, and travel can delay or suppress ovulation, making your cycle irregular and harder to predict accurately.' },
      { q: 'Is this calculator reliable for irregular cycles?', a: 'This works best for regular cycles of 24–35 days. Irregular cycles make ovulation timing unpredictable — OPK tests or tracking apps with multiple months of data are more reliable.' }
    ]
  },
  'heart-rate-zone-calculator': {
    what: `Heart Rate Zones are percentage ranges of your maximum heart rate that correspond to different exercise intensities and physiological benefits. Training in different zones achieves different fitness goals — fat burning, cardiovascular endurance, speed, or peak performance. Knowing your zones makes every workout count.`,
    formula: `Max Heart Rate = 220 − Age\n\nKarvonen Formula (more accurate, uses resting HR):\nTarget HR = ((MHR − Resting HR) × Intensity%) + Resting HR\n\nZone 1: 50–60% | Zone 2: 60–70% (Fat Burn)\nZone 3: 70–80% (Cardio) | Zone 4: 80–90% (Hard)`,
    benefits: ['Personalize workout intensity scientifically','Maximize fat burning in Zone 2','Build cardiovascular endurance safely','Avoid overtraining and injury','Track fitness improvements as zones shift over time'],
    faqs: [
      { q: 'Which zone burns the most fat?', a: 'Zone 2 (60–70% MHR) burns the highest percentage of calories from fat. Higher zones burn more total calories. A mix of Zone 2 for volume and Zone 4 for intensity is optimal for fat loss.' },
      { q: 'How do I measure my resting heart rate?', a: 'Check your pulse first thing in the morning before getting out of bed. Count beats for 60 seconds. A healthy resting HR is 60–80 bpm. Athletes often have 40–60 bpm.' },
      { q: 'Is the 220-minus-age formula accurate?', a: 'It is a rough estimate with plus or minus 10–20 bpm variation. For accuracy, do a max effort test with a heart rate monitor, or have a VO2 max lab test done.' },
      { q: 'How long should I train in each zone?', a: 'Zone 2: 60–70% of total training time. Zone 3–4: 20–30%. Zone 5: 5–10%. This 80/20 split is used by elite endurance athletes worldwide for optimal adaptation.' }
    ]
  },
  'macro-calculator': {
    what: `A Macro Calculator determines your daily targets for Protein, Carbohydrates, and Fats based on your body and goals. Whether you want to lose fat (cut), maintain weight, or build muscle (bulk), the right macro balance is the foundation of any successful nutrition plan backed by sports science.`,
    formula: `BMR (Mifflin-St Jeor):\nMale: 10×weight + 6.25×height − 5×age + 5\nFemale: 10×weight + 6.25×height − 5×age − 161\nTDEE = BMR × Activity Multiplier\nProtein: 2g/kg | Fat: 25% of cals | Carbs: remainder`,
    benefits: ['Eat the right amount for your specific goal','Prevent muscle loss while cutting fat','Optimize muscle gain while minimizing fat','Remove guesswork from nutrition planning','Science-backed approach used by athletes worldwide'],
    faqs: [
      { q: 'Which macro is most important for muscle gain?', a: 'Protein is most critical — aim for 1.6–2.2g per kg of body weight daily. Without sufficient protein, muscle synthesis cannot occur even with perfect training.' },
      { q: 'Can I build muscle and lose fat at the same time?', a: 'Yes, but mainly for beginners or those returning after a break. For most people, it is more efficient to alternate dedicated bulk and cut phases.' },
      { q: 'What activity multiplier should I use?', a: 'Sedentary (desk job): 1.2. Lightly active 1–3 days/wk: 1.375. Moderately active 3–5 days: 1.55. Very active 6–7 days: 1.725. Most people overestimate their activity level.' },
      { q: 'Do I need to hit macros exactly every day?', a: 'Aim to hit targets within 5% daily. Weekly average matters more than daily perfection. Consistency over weeks is what drives real body composition changes.' }
    ]
  },
  'running-pace-calculator': {
    what: `A Running Pace Calculator converts between pace (min/km), time, and distance. It predicts finish times for common race distances (5K, 10K, Half Marathon, Full Marathon) based on your current pace — helping you set realistic race goals and train at the right speed for each type of workout.`,
    formula: `Pace (min/km) = Total Time (min) ÷ Distance (km)\nFinish Time = Pace × Distance\n5K = 5km | 10K = 10km\nHalf Marathon = 21.0975km\nFull Marathon = 42.195km`,
    benefits: ['Predict race finish times at current fitness','Set realistic training pace targets','Compare training paces across distances','Plan negative splits for race day strategy','Track pace improvement over weeks of training'],
    faqs: [
      { q: 'What is a good running pace for beginners?', a: 'Any pace that lets you hold a conversation is good for beginners — typically 7–10 min/km. Focus on time on feet, not speed. Pace naturally drops as fitness improves.' },
      { q: 'How do I improve my race pace?', a: 'Include 20% of weekly training at higher intensities: tempo runs, interval training, and long slow runs for aerobic base. The other 80% should be easy Zone 2 running.' },
      { q: 'What is a negative split strategy?', a: 'Running the second half faster than the first. It is the most efficient race strategy — starting conservatively prevents early fatigue and allows a strong finish. Most world records use negative splits.' },
      { q: 'How accurate are marathon time predictions?', a: 'Predictions based on 5K or 10K pace are accurate to within 5 minutes for trained runners. Fatigue, hills, weather, and fueling strategy significantly affect actual marathon times.' }
    ]
  },
  'grade-calculator': {
    what: `A Grade Calculator computes your weighted average grade across multiple assignments, quizzes, midterms, and finals. By assigning different weights to each component, it gives you the true reflection of your academic performance — exactly how your professor calculates your final grade at the end of term.`,
    formula: `Weighted Average = Sum(Score × Weight) ÷ Sum(Weight)\n\nGrade Scale:\nA+ = 90–100% (4.0 GPA)\nA = 85–89% (3.7) | B+ = 77–79% (3.3)\nB = 73–76% (3.0) | C = 60–66% (2.0) | F < 60%`,
    benefits: ['Know your exact grade at any point in the semester','Calculate what score you need on the final to pass','Prioritize assignments by their weight and impact','Avoid grade surprises at the end of term','Plan study time based on which assignments matter most'],
    faqs: [
      { q: 'What if my weights do not add up to 100%?', a: 'This calculator handles partial weight totals — it divides by the total weight used, not 100. So if you only entered 70% of your grade components, it calculates fairly based on those.' },
      { q: 'How do I calculate what I need on the final?', a: 'If you need a 75% overall and your final is worth 30%: Required Final Score = (75 − Current Weighted Average × 70%) ÷ 30%. Use your current weighted average here.' },
      { q: 'Do plus or minus grades affect GPA?', a: 'Yes, at most universities. A = 4.0, A- = 3.7, B+ = 3.3, B = 3.0. A difference of one grade step can significantly impact your cumulative GPA over multiple courses.' },
      { q: 'What is the difference between weighted and unweighted GPA?', a: 'Unweighted GPA treats all courses equally up to 4.0. Weighted GPA gives bonus points for honors and AP classes up to 5.0. Most US colleges consider both during admissions.' }
    ]
  },
  'study-hours-calculator': {
    what: `A Study Hours Calculator helps you create a realistic study plan based on your exam date, number of subjects, daily available hours, and current preparation level. It tells you exactly how many hours you need and whether your plan is feasible — so you study smarter, not just harder.`,
    formula: `Total Hours Needed = Subjects × (Target% − Current%) × 40\nDaily Required = Total Hours ÷ Days Until Exam\nFeasibility = Compare Daily Required vs Hours Available\n\nIf Daily Required greater than Available: start earlier or reduce scope`,
    benefits: ['Create realistic achievable study schedules','Prevent last-minute cramming with early planning','Allocate time per subject based on knowledge gaps','Stay motivated with clear daily targets','Reduce exam anxiety with a concrete plan'],
    faqs: [
      { q: 'How many hours should I study per day?', a: 'Research shows optimal study duration is 4–6 focused hours per day. Beyond 6 hours, retention drops significantly. Quality beats quantity — use active recall and spaced repetition.' },
      { q: 'Is cramming effective?', a: 'Cramming works for short-term recall but fails for long-term retention. Spaced repetition — reviewing material at increasing intervals — is 2–3x more effective than massed cramming.' },
      { q: 'How should I split study time between subjects?', a: 'Spend more time on your weakest subjects and those with highest exam weight. A good starting ratio: weakest 40%, medium 35%, strongest 25%. Adjust weekly based on progress.' },
      { q: 'What is the best study technique?', a: 'Active recall (testing yourself without looking at notes) and spaced repetition are the most evidence-backed techniques. Passive re-reading is the least effective despite feeling productive.' }
    ]
  },
  'reading-speed-calculator': {
    what: `A Reading Speed Calculator estimates how long it takes to read a book based on your words per minute reading speed. The average adult reads 200–300 WPM. Speed readers can reach 400–700 WPM. This tool helps you plan your reading schedule and set realistic reading goals for the year.`,
    formula: `Total Words = Pages × Words Per Page (avg ~250)\nReading Time (min) = Total Words ÷ WPM\nDays to Finish = Reading Time ÷ Daily Reading Minutes\nBooks Per Year = 365 × Daily Reading Minutes ÷ Mins Per Book`,
    benefits: ['Plan reading schedules for books on your list','Set daily reading goals to finish on time','Calculate how many books you can read per year','Motivate yourself with realistic milestones','Perfect for students book clubs and avid readers'],
    faqs: [
      { q: 'What is the average adult reading speed?', a: 'The average adult reads 200–300 WPM with about 60% comprehension. College students average 300 WPM. Speed readers hit 400–700 WPM but often at lower comprehension.' },
      { q: 'How can I improve my reading speed?', a: 'Eliminate subvocalization (reading words aloud in your head). Use a finger to guide your eye. Read in chunks of 2–3 words at a time. Practice daily — even 20 minutes yields major improvement.' },
      { q: 'How many words are in a typical book?', a: 'A typical novel: 70,000–100,000 words (280–400 pages). Non-fiction: 50,000–80,000 words. A dense academic textbook can exceed 150,000 words.' },
      { q: 'How much reading is needed to stay informed?', a: 'Reading 30 minutes daily at 250 WPM equals about 15–20 books per year. This puts you in the top 10% of readers and makes a massive cumulative difference over time.' }
    ]
  },
  'words-per-minute-calculator': {
    what: `A Words Per Minute (WPM) Calculator measures your typing speed and accuracy. WPM is the standard metric used for keyboard typing tests and employment assessments. Net WPM accounts for errors — it is the most accurate measure of real-world typing productivity and is used by all professional typing tests.`,
    formula: `Words = Total Characters ÷ 5 (1 standard word = 5 chars)\nGross WPM = Words Typed ÷ Time (minutes)\nNet WPM = Gross WPM − (Errors ÷ Minutes)\nAccuracy % = (1 − Errors ÷ Total Words) × 100`,
    benefits: ['Measure your typing speed objectively','Identify areas for speed and accuracy improvement','Prepare for job typing tests and assessments','Track progress over weeks of daily practice','Benchmark against professional standards worldwide'],
    faqs: [
      { q: 'What is a good WPM typing speed?', a: 'Beginner: under 30 WPM. Average: 40–60 WPM. Good: 60–80 WPM. Fast: 80–100 WPM. Professional: 100+ WPM. Most office jobs require 40–60 WPM minimum.' },
      { q: 'How can I improve my typing speed?', a: 'Learn proper 10-finger touch typing first. Practice on TypeRacer or Monkeytype daily. Focus on accuracy before speed — speed follows naturally with consistent practice.' },
      { q: 'Does typing speed matter in jobs?', a: 'Yes, for data entry (60–80 WPM required), transcription (80–100+ WPM), customer service, and medical coding. For developers and writers, speed helps productivity but accuracy matters more.' },
      { q: 'What is the difference between WPM and CPM?', a: 'WPM divides characters by 5 to standardize for word length variation. CPM counts raw characters per minute. WPM is the universal standard for typing speed assessment worldwide.' }
    ]
  },
  'tuition-cost-calculator': {
    what: `A Tuition Cost Calculator estimates the total cost of your education program including tuition, room and board, after scholarships and aid, with tuition inflation factored in year by year. US college tuition has risen 3–5% annually for decades, making early financial planning absolutely essential for students and families.`,
    formula: `Total Tuition = Sum of Annual Tuition × (1 + Growth Rate)^Year\nTotal Room & Board = Annual R&B × Years\nTotal Aid = Annual Scholarship × Years\nNet Cost = Total Tuition + Total R&B − Total Aid`,
    benefits: ['Plan college savings early with realistic projections','Factor in tuition inflation for accurate forecasting','Compare net cost across different schools','Calculate the true ROI of your degree program','Avoid student loan shock by planning years ahead'],
    faqs: [
      { q: 'What is the average US college tuition in 2025?', a: 'Public in-state: ~$11,000/year. Public out-of-state: ~$29,000/year. Private nonprofit: ~$42,000/year. Adding room, board, and fees brings typical total costs to $27,000–$60,000+ per year.' },
      { q: 'How does tuition inflation affect total cost?', a: 'At 3% annual increase, $40,000 tuition today becomes ~$52,000 by year 4. This calculator accounts for year-by-year increases to give you the true projected total.' },
      { q: 'What is the 529 college savings plan?', a: 'A 529 is a tax-advantaged savings account for education expenses. Contributions grow tax-free and withdrawals for qualified education expenses are federal tax-free.' },
      { q: 'Is a private college worth the extra cost?', a: 'It depends on the school and major. Top private universities often offer large merit and need-based aid that brings net cost below sticker price. Always compare net cost after all aid.' }
    ]
  },
  'podcast-revenue-calculator': {
    what: `A Podcast Revenue Calculator estimates your earnings based on downloads, CPM rates, and ad slots. CPM (Cost Per Mille) is what advertisers pay per 1,000 downloads. Most podcast ad deals are structured as pre-roll (before the show), mid-roll (during), and post-roll (after) ad spots with different CPM rates.`,
    formula: `Revenue Per Episode = (Downloads ÷ 1000) × CPM × Ad Slots\nMonthly Revenue = Revenue Per Episode × Episodes Per Month\nAnnual Revenue = Monthly Revenue × 12\n\nTypical CPM: Host-read $18–$50 | Programmatic $5–$15`,
    benefits: ['Set realistic podcast monetization goals','Know exactly how many downloads you need for target income','Compare CPM rates and ad slot strategies','Plan content frequency for maximum revenue','Negotiate better sponsorship deals with real data'],
    faqs: [
      { q: 'How many downloads do I need to monetize?', a: 'Most podcast ad networks require 1,000–5,000 downloads per episode. Direct sponsorships are possible at lower numbers if your audience is highly targeted in a valuable niche.' },
      { q: 'What CPM rate should I expect?', a: 'Beginner and broad topics: $10–$20. Business, finance, tech: $25–$50. B2B targeting professionals: $50–$100. Host-read personalized ads command premium rates over dynamically inserted ones.' },
      { q: 'What are the best podcast monetization methods?', a: 'Host-read sponsorships (highest CPM), affiliate marketing, listener memberships via Patreon, premium content, courses, and live events. Most successful podcasters combine 3–4 revenue streams.' },
      { q: 'Does download count or listener count matter more?', a: 'Downloads are the standard metric for ad deals. However, unique listeners and completion rate (how much of each episode is heard) increasingly matter to sophisticated advertisers.' }
    ]
  },
  'twitter-x-earnings-calculator': {
    what: `The Twitter X Earnings Calculator estimates your potential income from X's Creator Revenue Sharing program and sponsored tweet deals. X launched ad revenue sharing in 2023 for Premium subscribers, paying creators based on ad impressions on their content from other verified Premium followers.`,
    formula: `X Ad Revenue = (Impressions ÷ 1000) × RPM\nRPM typically $0.50–$2.00 for eligible creators\n\nSponsored Post Rate = Followers ÷ 1000 × $50\nIndustry average: $10–$100 per 1000 engaged followers\nTotal Monthly = Ad Revenue + Sponsored Post Revenue`,
    benefits: ['Estimate X revenue share earnings realistically','Calculate sponsored post rates for brand deals','Know follower and impression targets for monetization','Compare X income vs other creator platforms','Plan content strategy for maximum reach and engagement'],
    faqs: [
      { q: 'How does X revenue sharing work?', a: 'X pays eligible creators (Premium subscribers with 500+ followers and 5M+ impressions in past 3 months) a share of ad revenue from ads shown in their post replies. Payment is via Stripe.' },
      { q: 'How much does X pay per 1000 impressions?', a: 'Reported RPM rates range from $0.50 to $3.00 per 1,000 impressions, varying by niche, audience location (US earns more), and verification tier.' },
      { q: 'What is a realistic sponsored post rate on X?', a: 'Micro-influencers 10K–50K followers: $100–$500 per post. Mid-tier 50K–500K: $500–$5,000. Macro 500K+: $5,000–$50,000+. Rates depend heavily on engagement rate and audience quality.' },
      { q: 'Is X a good platform for creator monetization?', a: 'X pays lower rates than YouTube or Instagram for most creators. Its strength is in niche B2B audiences like finance, tech, and crypto where CPM rates are highest.' }
    ]
  },
  'freelancer-rate-calculator': {
    what: `A Freelancer Rate Calculator helps you determine the minimum hourly rate you must charge to cover your income goals, business expenses, taxes, and vacation time. Many freelancers underprice themselves by not accounting for non-billable time, self-employment taxes, and business costs — this calculator prevents that mistake.`,
    formula: `Annual Revenue Needed = Desired Income + Expenses\nPre-Tax Revenue = Annual Revenue ÷ (1 − Tax Rate)\nAnnual Billable Hours = Hours Per Week × (52 − Vacation Weeks)\nMinimum Rate = Pre-Tax Revenue ÷ Annual Billable Hours\nRecommended Rate = Minimum Rate × 1.20 (20% buffer)`,
    benefits: ['Never underprice your services again','Account for taxes expenses and non-billable time','Set rates that are sustainable long-term','Negotiate confidently knowing your floor rate','Add a buffer for slow periods and business growth'],
    faqs: [
      { q: 'Why do freelancers charge more than employees?', a: 'As a freelancer you pay both sides of FICA tax (about 15%), buy your own health insurance, fund your own retirement, cover equipment costs, handle non-billable admin time, and have no job security.' },
      { q: 'How much of my rate should be profit?', a: 'After covering taxes (25–35%), expenses (10–20%), and living costs, aim for 15–25% net profit going into savings and business reinvestment. Build this margin in from the start.' },
      { q: 'How do I raise my rates with existing clients?', a: 'Give 30–60 days notice. Frame it as a business milestone. Offer to honor current rates for one more project. Most clients who value you will stay without issue.' },
      { q: 'Should I charge hourly or per project?', a: 'Project-based pricing is usually better for experienced freelancers — you earn more as you get faster. Value-based pricing (charging based on client outcome) earns the highest rates.' }
    ]
  },
  'blog-income-calculator': {
    what: `A Blog Income Calculator estimates your total monthly and annual blog revenue from all monetization streams: display ads (AdSense, Mediavine, AdThrive), affiliate marketing commissions, and digital product sales. Most successful blogs combine multiple revenue streams to reach $1,000–$10,000+ per month.`,
    formula: `AdSense Revenue = (Page Views ÷ 1000) × RPM\nAffiliate Revenue = Traffic × Conversion Rate × Commission\nTotal Monthly = Ad Revenue + Affiliate + Digital Products\n\nRPM by network: AdSense $2–$10 | Mediavine $15–$30 | AdThrive $25–$50+`,
    benefits: ['Project blog income at different traffic levels','Understand which revenue stream has best ROI','Set traffic targets to hit income goals','Compare ad network options by RPM value','Plan content strategy around highest-value topics'],
    faqs: [
      { q: 'How much traffic do I need to make money blogging?', a: 'With AdSense at $5 RPM: 100,000 page views equals $500/month. With Mediavine at $20 RPM: 50,000 page views equals $1,000/month. Premium affiliate content can earn more at lower traffic.' },
      { q: 'What is a good AdSense RPM?', a: '$2–$5 is average. $5–$15 is good. $15–$30 means you qualify for premium networks like Mediavine (50K+ sessions) or AdThrive (100K+ page views). Finance and legal niches get the highest RPMs.' },
      { q: 'What are the best blog niches for income?', a: 'Personal finance, health and wellness, food, travel, technology, and parenting are top earners. Finance and tech command the highest ad RPMs. Food blogs drive the highest affiliate conversions.' },
      { q: 'How long does it take to earn from a blog?', a: 'Typically 6–18 months before significant Google traffic and income. Focus the first 6 months on creating 50–100 high-quality SEO-optimized posts. Patience and consistency are the real requirements.' }
    ]
  },
  'property-tax-calculator': {
    what: `Property Tax is an annual tax imposed by local governments on real estate, calculated as a percentage of the assessed value. It funds schools, roads, emergency services, and local infrastructure. Rates vary dramatically by location — from 0.3% in Hawaii to over 2% in New Jersey and Illinois.`,
    formula: `Assessed Value = Property Market Value × Assessment Ratio\nTaxable Value = Assessed Value − Exemptions\nAnnual Tax = Taxable Value × Tax Rate ÷ 100\nMonthly Tax = Annual Tax ÷ 12\nEffective Rate = Annual Tax ÷ Market Value × 100`,
    benefits: ['Budget accurately for property ownership costs','Compare tax burden across different locations','Understand assessment ratios and exemptions','Calculate escrow amounts for mortgage payments','Plan for tax implications before buying property'],
    faqs: [
      { q: 'Can I appeal my property tax assessment?', a: 'Yes! If your property is over-assessed, file an appeal with your local assessor office. About 30–40% of appeals result in reductions. Gather recent comparable sales data to support your case.' },
      { q: 'What is a homestead exemption?', a: 'A homestead exemption reduces the taxable value of your primary residence. For example, a $50,000 exemption on a $300,000 home means you only pay tax on $250,000.' },
      { q: 'How is property tax paid?', a: 'Most homeowners pay through escrow — your mortgage servicer collects 1/12 of the annual tax bill each month with your payment, then pays the tax authority when due.' },
      { q: 'Are property taxes deductible?', a: 'In the US, up to $10,000 of state and local taxes including property taxes can be deducted if you itemize (SALT cap from 2017 Tax Cuts and Jobs Act). Consult a tax advisor.' }
    ]
  },
  'rental-yield-calculator': {
    what: `Rental Yield measures the annual return on a rental property as a percentage of its purchase price. Gross Yield uses rent alone. Net Yield subtracts all expenses for a true return picture. Net yield is what actually ends up in your pocket and is the metric serious real estate investors track.`,
    formula: `Gross Yield = (Annual Rent ÷ Property Value) × 100\n\nNet Annual Income = Annual Rent × (1 − Vacancy%) − All Expenses\nNet Yield = (Net Annual Income ÷ Property Value) × 100\nPayback Period = Property Value ÷ Net Annual Income`,
    benefits: ['Compare investment properties on equal footing','Understand true return after all real expenses','Identify underperforming properties in your portfolio','Set rent prices to achieve target yield','Evaluate whether to buy hold or sell a property'],
    faqs: [
      { q: 'What is a good rental yield?', a: 'In the US and UK, a good net rental yield is 5–8%. Below 4% often means overpriced or too many expenses. Above 10% may indicate higher risk. In India, 2–4% is typical for residential property.' },
      { q: 'Gross vs net yield — which matters?', a: 'Always focus on net yield. Gross yield ignores vacancy (5–10% loss), maintenance (1% of value per year), property management (8–12% of rent), taxes, and insurance. Net yield can be 40–50% lower than gross.' },
      { q: 'How do I increase rental yield?', a: 'Raise rent to market rate, reduce vacancy through great tenant screening, minimize maintenance costs, self-manage instead of using a property manager (saves 8–12%), and add value with targeted renovations.' },
      { q: 'Is residential or commercial property better?', a: 'Commercial offers higher yields (6–10%) but higher vacancy risk and management complexity. Residential (3–6% net) is more stable and easier to manage. Most beginner investors start with residential.' }
    ]
  },
  'cap-rate-calculator': {
    what: `Cap Rate (Capitalization Rate) is the most important metric in commercial real estate investment. It measures the expected annual return based on Net Operating Income (NOI) relative to current market value — independent of financing. It lets investors compare properties regardless of how they are funded.`,
    formula: `NOI = Gross Rental Income − All Operating Expenses\n(Includes: vacancy, maintenance, mgmt, insurance, tax)\n(Excludes: mortgage payments, depreciation, income tax)\n\nCap Rate = NOI ÷ Property Value × 100\nImplied Value = NOI ÷ Cap Rate`,
    benefits: ['Compare investment properties across markets objectively','Value a property based on its income potential','Understand market cap rates in different areas','Identify undervalued or overpriced properties','Essential for commercial real estate due diligence'],
    faqs: [
      { q: 'What is a good cap rate?', a: 'Class A urban: 4–5%. Suburban: 5–7%. Rural or value-add: 7–10%+. Higher cap rate means higher return but usually higher risk. In expensive cities, 4–5% cap rates are standard.' },
      { q: 'Does cap rate include mortgage payments?', a: 'No — cap rate excludes financing. This makes it useful for comparing properties regardless of how they are financed. When you factor in leverage you calculate Cash-on-Cash Return instead.' },
      { q: 'What expenses are included in NOI?', a: 'Include: property tax, insurance, property management, maintenance, vacancy allowance (5–10%), and utilities if landlord-paid. Exclude: mortgage P&I, depreciation, and income tax.' },
      { q: 'What does it mean when cap rates compress?', a: 'Falling cap rates mean prices are rising faster than rents — properties are becoming more expensive relative to income. This means lower returns for new buyers but capital appreciation for existing owners.' }
    ]
  },
  'roi-calculator': {
    what: `ROI (Return on Investment) measures how much profit you made relative to your total investment cost. It is the most universal metric for evaluating investment profitability across all asset classes — stocks, real estate, business ventures, or any capital deployment decision you face.`,
    formula: `ROI = (Net Profit ÷ Total Investment) × 100\nNet Profit = Final Value − Total Investment\nTotal Investment = Initial Amount + Additional Costs\n\nAnnualized ROI (CAGR) = (Final ÷ Initial)^(1 ÷ Years) − 1`,
    benefits: ['Compare returns across completely different investment types','Measure actual profitability of any capital decision','Factor in all costs for an accurate return picture','Evaluate past investments to improve future decisions','Essential for business case justification and reporting'],
    faqs: [
      { q: 'What is a good ROI?', a: 'Annual ROI: Safe investments 3–5%, stocks 7–10%, real estate 8–12%, high-risk ventures 20%+. Always compare ROI against your opportunity cost — what you could have earned elsewhere.' },
      { q: 'Why use annualized ROI instead of total ROI?', a: 'A 50% return over 10 years sounds great but is only 4.1% per year — worse than a savings account. Annualized ROI (CAGR) allows fair comparison between a 2-year and a 10-year investment.' },
      { q: 'Should I include inflation in ROI calculations?', a: 'For a complete picture, calculate real ROI = (1 + nominal ROI) divided by (1 + inflation) minus 1. With 10% nominal return and 3% inflation, real return is about 6.8% in purchasing power.' },
      { q: 'What costs should I include in total investment?', a: 'Include all costs: purchase price, transaction fees, legal costs, renovation or improvement costs, ongoing maintenance costs, and disposal costs when selling. Missing costs inflates your apparent ROI.' }
    ]
  },
  'down-payment-savings-calculator': {
    what: `A Down Payment Savings Calculator tells you how long it will take to save for a home down payment based on your current savings, monthly contributions, and interest earned on savings. It also shows the impact of choosing different down payment percentages — especially the 20% threshold that eliminates Private Mortgage Insurance.`,
    formula: `Down Payment Target = Home Price × Down Payment %\nSavings Gap = Target − Current Savings\n\nMonthly Growth: Balance = Balance × (1+r) + Monthly Contribution\nRepeat until Balance reaches Target\nPMI savings: 20% down eliminates 0.5–1.5% annual PMI cost`,
    benefits: ['Set a clear savings timeline for your home purchase','See the impact of saving an extra $100 per month','Compare 3% 5% 10% and 20% down payment scenarios','Factor in high-yield savings account growth','Eliminate PMI by targeting 20% down payment'],
    faqs: [
      { q: 'How much should I put down on a house?', a: '20% is ideal — it eliminates PMI, gives you instant equity, and often secures better interest rates. But 3–10% down programs (FHA, conventional) let you buy sooner if needed.' },
      { q: 'What is PMI and how much does it cost?', a: 'Private Mortgage Insurance is required when you put less than 20% down. It costs 0.5–1.5% of the loan amount per year — $150–$450/month on a $300K loan. It is removed when you reach 20% equity.' },
      { q: 'Where should I keep my down payment savings?', a: 'Use a High-Yield Savings Account paying 4–5% APY for money needed in 1–3 years — safe and liquid. Avoid stock market exposure for short-term savings goals.' },
      { q: 'Can I use gifts or grants for a down payment?', a: 'Yes! Most loan programs allow gift funds from family members. Many states offer down payment assistance programs of $5,000–$25,000+ as grants or low-interest loans for first-time buyers.' }
    ]
  },
  'closing-cost-calculator': {
    what: `Closing Costs are fees paid at the final stage of a real estate transaction. For buyers, they typically total 2–5% of the purchase price. For sellers, they run 6–10% (mainly agent commissions). These costs often catch buyers off-guard — factoring them into your homebuying budget from the start is essential.`,
    formula: `Buyer Closing Costs:\nLender Fees: 1% of loan + ~$1,200\nTitle & Escrow: ~0.5% of purchase price + $500\nTransfer Tax: Purchase Price × State Rate\n\nTotal Buyer Closing Costs = approximately 2–5% of purchase price`,
    benefits: ['Budget accurately for the total cash needed to close','Avoid being surprised by fees at closing day','Compare estimated costs across different purchase prices','Understand which fees are negotiable','Plan seller concessions to offset buyer costs'],
    faqs: [
      { q: 'Can closing costs be rolled into the mortgage?', a: 'In some cases yes — with a no-closing-cost mortgage where costs are rolled into a higher interest rate. You pay nothing upfront but more over the loan life. Only worthwhile if you plan to sell within 5 years.' },
      { q: 'Can I negotiate closing costs?', a: 'Yes! Lender fees are negotiable — compare Loan Estimates from 3+ lenders. You can also ask the seller to pay your closing costs as a concession, which is common in buyer markets.' },
      { q: 'What are prepaid costs at closing?', a: 'Prepaid items include homeowners insurance for the first year, mortgage interest from closing to end of month, and property tax escrow for 2–3 months. These are not fees but require cash at closing.' },
      { q: 'Do sellers pay closing costs too?', a: 'Yes — sellers typically pay 6–10% of sale price: 5–6% in real estate agent commissions plus 1–2% in transfer taxes and attorney fees. For a $400K home, seller costs can be $24,000–$40,000.' }
    ]
  },
  'profit-margin-calculator': {
    what: `Profit Margin measures how much profit a company keeps from its revenue. The three key margins — Gross, Operating, and Net — each reveal a different layer of profitability. Gross margin shows product-level efficiency. Operating margin shows operational efficiency. Net margin shows the final bottom line.`,
    formula: `Gross Profit = Revenue − Cost of Goods Sold (COGS)\nGross Margin % = Gross Profit ÷ Revenue × 100\n\nOperating Income = Gross Profit − Operating Expenses\nOperating Margin % = Operating Income ÷ Revenue × 100\n\nNet Margin % = Net Income ÷ Revenue × 100`,
    benefits: ['Identify whether pricing and costs are sustainable','Compare profitability against industry benchmarks','Find the operational layer causing profit leakage','Guide pricing and cost-cutting decisions','Essential metric for investors and business valuation'],
    faqs: [
      { q: 'What is a good profit margin by industry?', a: 'SaaS: 60–80% gross, 15–30% net. Retail: 20–40% gross, 2–6% net. Restaurants: 60–70% gross, 3–9% net. Manufacturing: 25–40% gross, 5–15% net. Compare against your specific industry benchmark.' },
      { q: 'What is the difference between gross and net margin?', a: 'Gross margin only subtracts the direct cost of making your product. Net margin subtracts everything — COGS, salaries, rent, marketing, interest, and taxes. Net margin is the truest measure of profitability.' },
      { q: 'How do I improve my profit margin?', a: 'Raise prices (biggest lever — even 5% price increase can double net margin). Reduce COGS by negotiating supplier terms. Cut operating expenses through automation. Upsell higher-margin products.' },
      { q: 'Can a company have positive gross margin but negative net margin?', a: 'Yes — many startups do. High gross margins but large operating expenses (R&D, sales, marketing) result in net losses. This is acceptable early-stage if unit economics are fundamentally sound.' }
    ]
  },
  'markup-calculator': {
    what: `A Markup Calculator determines your selling price from cost and markup percentage, or calculates what markup you are applying from cost and price. Markup and Margin are often confused — Markup is profit as a percentage of COST. Margin is profit as a percentage of SELLING PRICE. Getting this distinction right is critical for accurate pricing.`,
    formula: `Markup to Price:\nSelling Price = Cost × (1 + Markup% ÷ 100)\nProfit = Selling Price − Cost\n\nPrice to Markup:\nMarkup% = (Price − Cost) ÷ Cost × 100\nGross Margin% = (Price − Cost) ÷ Price × 100\n\nNote: 50% markup = 33.3% margin (not the same!)`,
    benefits: ['Price products correctly for target profitability','Avoid confusing markup with margin (very common mistake)','Calculate required markup to hit margin targets','Model revenue needed to achieve profit goals','Essential for retail wholesale and manufacturing pricing'],
    faqs: [
      { q: 'What is the difference between markup and margin?', a: 'Markup is profit divided by cost times 100. Margin is profit divided by price times 100. For a $50 cost item sold at $80: Markup = 60%, Margin = 37.5%. They are not interchangeable.' },
      { q: 'What markup should I charge?', a: 'Retail general merchandise: 50–100%. Electronics: 10–30%. Jewelry: 100–300%. Restaurants on food cost: 300–500%. Software: 1000%+. Start with your desired margin and work backwards to required markup.' },
      { q: 'How do discounts affect my margin?', a: 'Discounts hurt margins dramatically. If your margin is 40% and you give a 20% discount, you need to sell 100% more units just to break even. Always calculate the volume needed to offset a discount.' },
      { q: 'What is keystone pricing?', a: 'Keystone pricing is doubling the wholesale cost — a 100% markup giving a 50% margin. It is a traditional retail starting point but may not account for competitive pricing or actual overhead costs.' }
    ]
  },
  'revenue-calculator': {
    what: `A Revenue Calculator computes your net revenue by starting from gross revenue and deducting discounts and refunds. Revenue is the top-line number in any business — but net revenue after returns and discounts is what actually flows through your P&L and determines real business health.`,
    formula: `Gross Revenue = Units Sold × Price Per Unit\nAfter Discount = Gross Revenue × (1 − Discount%)\nRefund Amount = After Discount × Refund Rate%\nNet Revenue = After Discount − Refund Amount\nARPU = Net Revenue ÷ Units Sold`,
    benefits: ['Model revenue at different price and volume combinations','See the real impact of discounts on net revenue','Calculate Average Revenue Per Unit (ARPU)','Forecast revenue for business planning and investors','Identify the true revenue efficiency of your pricing strategy'],
    faqs: [
      { q: 'What is the difference between revenue and profit?', a: 'Revenue is total money received from customers (top line). Profit is what remains after subtracting all costs (bottom line). A company can have high revenue but still lose money.' },
      { q: 'How do refund rates affect my business?', a: 'A 5% refund rate eliminates 5% of your revenue and doubles the impact on profit margin. High refund rates signal product-market fit issues or misleading marketing. Target below 3% for e-commerce.' },
      { q: 'What drives revenue growth?', a: 'Increase units sold (more customers or repeat purchases), raise price (highest leverage lever), or expand into new markets and products. All three together compound revenue growth dramatically.' },
      { q: 'What is MRR and ARR?', a: 'Monthly Recurring Revenue (MRR) and Annual Recurring Revenue (ARR) are standard metrics for subscription businesses. ARR = MRR × 12. They measure predictable sustainable revenue and are core to SaaS valuation.' }
    ]
  },
  'burn-rate-calculator': {
    what: `Burn Rate measures how fast a startup is spending its cash reserves. Gross Burn is total monthly expenses. Net Burn is expenses minus revenue. Runway is how many months of cash remain at the current burn rate. These are the most critical survival metrics for any pre-profitable startup company.`,

function buildInfoSection(id, name) {
  const info = calcInfo[id];
  if (!info) return '';
  const pid = id.replace(/-/g,'_');
  const tabLabels = ['What is ' + name + '?', name + ' Formula', 'Benefits', 'FAQ'];
  const tabIds = ['what','formula','benefits','faq'];

  const tabBtns = tabLabels.map((label, i) =>
    `<button class="info-tab-btn${i===0?' active':''}" onclick="switchInfoTab('${pid}','${tabIds[i]}',this)">${label}</button>`
  ).join('');

  const benefitsHTML = info.benefits.map(b => `<li>${b}</li>`).join('');
  const faqsHTML = info.faqs.map((f,i) =>
    `<div class="faq-item" id="faq_${pid}_${i}">
      <div class="faq-q" onclick="toggleFaq('faq_${pid}_${i}')">${f.q}<span class="faq-arrow">+</span></div>
      <div class="faq-a">${f.a}</div>
    </div>`
  ).join('');

  return `
  <div class="info-section">
    <div class="info-tab-row">${tabBtns}</div>
    <div class="info-panel active" id="${pid}_what">
      <h3>What is ${name}?</h3>
      <p>${info.what}</p>
    </div>
    <div class="info-panel" id="${pid}_formula">
      <h3>${name} Formula</h3>
      <div class="formula-box">${info.formula.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="info-panel" id="${pid}_benefits">
      <h3>Benefits of Using ${name}</h3>
      <ul class="benefits-list">${benefitsHTML}</ul>
    </div>
    <div class="info-panel" id="${pid}_faq">
      <h3>Frequently Asked Questions</h3>
      ${faqsHTML}
    </div>
  </div>`;
}

function switchInfoTab(pid, tab, btn) {
  const section = btn.closest('.info-section');
  section.querySelectorAll('.info-tab-btn').forEach(b => b.classList.remove('active'));
  section.querySelectorAll('.info-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById(pid + '_' + tab);
  if (panel) panel.classList.add('active');
}

function toggleFaq(id) {
  const item = document.getElementById(id);
  item.classList.toggle('open');
}

// ============ NEW CALC LOGIC ============

function fmtUSD(n) {
  if(isNaN(n)) return '—';
  if(n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if(n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toLocaleString('en-US', {maximumFractionDigits:2});
}

function calcMort() {
  const price = num('mort_price'), down = num('mort_down');
  const r = num('mort_r') / 100 / 12, t = num('mort_t') * 12;
  const tax = num('mort_tax');
  const loan = price - down;
  if(loan <= 0 || r <= 0) return;
  const pi = loan * r * Math.pow(1+r, t) / (Math.pow(1+r, t) - 1);
  const taxmo = tax / 12;
  const total = pi * t;
  const totalInterest = total - loan;
  set('mort_pi', fmtUSD(pi));
  set('mort_taxmo', fmtUSD(taxmo));
  set('mort_int', fmtUSD(totalInterest));
  set('mort_tot', fmtUSD(total + down));
  set('mort_mo', fmtUSD(pi + taxmo));
  showResult('mort_res');
}

function calcPaycheck() {
  const gross = num('pay_gross');
  const freq = parseInt(val('pay_freq'));
  const fedPct = num('pay_fed') / 100, statePct = num('pay_state') / 100;
  const other = num('pay_other');
  const fica = gross * 0.0765;
  const fedAmt = gross * fedPct;
  const stateAmt = gross * statePct;
  const net = gross - fedAmt - stateAmt - fica - other;
  set('pay_fedamt', fmtUSD(fedAmt));
  set('pay_stateamt', fmtUSD(stateAmt));
  set('pay_fica', fmtUSD(fica));
  set('pay_net', fmtUSD(net));
  set('pay_annual', fmtUSD(net * freq));
  showResult('pay_res');
}

function calcCC() {
  const bal = num('cc_bal'), apr = num('cc_apr') / 100 / 12, pay = num('cc_pay');
  if(pay <= bal * apr) { set('cc_months', 'Payment too low'); showResult('cc_res'); return; }
  const months = Math.ceil(-Math.log(1 - bal * apr / pay) / Math.log(1 + apr));
  const totalPaid = pay * months;
  const totalInt = totalPaid - bal;
  const date = new Date(); date.setMonth(date.getMonth() + months);
  set('cc_months', months + ' months');
  set('cc_int', fmtUSD(totalInt));
  set('cc_tot', fmtUSD(totalPaid));
  set('cc_date', date.toLocaleDateString('en-US', {month:'short', year:'numeric'}));
  set('cc_pct', ((totalInt / bal) * 100).toFixed(1) + '%');
  showResult('cc_res');
}

function calcHA() {
  const inc = num('ha_inc'), debt = num('ha_debt'), down = num('ha_down');
  const r = num('ha_r') / 100 / 12, t = num('ha_t') * 12;
  const maxMonthly = (inc / 12) * 0.28;
  const maxPayment = maxMonthly - debt;
  const maxLoan = maxPayment * (Math.pow(1+r, t) - 1) / (r * Math.pow(1+r, t));
  const maxPrice = maxLoan + down;
  const dti = ((debt + maxPayment) / (inc / 12) * 100).toFixed(1);
  const dpct = (down / maxPrice * 100).toFixed(1);
  set('ha_price', fmtUSD(maxPrice));
  set('ha_mo', fmtUSD(maxPayment));
  set('ha_loan', fmtUSD(maxLoan));
  set('ha_dti', dti + '%');
  set('ha_dpct', dpct + '%');
  showResult('ha_res');
}

function calcRVB() {
  const price = num('rvb_price'), down = num('rvb_down'), rent = num('rvb_rent');
  const r = num('rvb_r') / 100 / 12, yrs = num('rvb_yrs');
  const months = yrs * 12;
  const loan = price - down;
  const mortmo = loan * r * Math.pow(1+r, months*12/months) / (Math.pow(1+r, months*12/months) - 1);
  // Simplified: buy cost = down + (mortgage * months) + maint(1% home/yr)
  const maint = price * 0.01 * yrs;
  const buyCost = down + mortmo * months + maint;
  const rentCost = rent * months;
  const save = Math.abs(buyCost - rentCost);
  const winner = buyCost < rentCost ? '🏠 Buying' : '🏢 Renting';
  set('rvb_winner', winner);
  set('rvb_buycost', fmtUSD(buyCost));
  set('rvb_rentcost', fmtUSD(rentCost));
  set('rvb_mortmo', fmtUSD(mortmo));
  set('rvb_save', fmtUSD(save));
  showResult('rvb_res');
}

function calcDP() {
  const bal = num('dp_bal'), r = num('dp_r') / 100 / 12, pay = num('dp_pay');
  const minPay = bal * r;
  if(pay <= minPay) { set('dp_months', 'Increase payment'); showResult('dp_res'); return; }
  const months = Math.ceil(-Math.log(1 - bal * r / pay) / Math.log(1 + r));
  const totalPaid = pay * months;
  const totalInt = totalPaid - bal;
  const date = new Date(); date.setMonth(date.getMonth() + months);
  set('dp_months', months + ' months (' + Math.ceil(months/12) + ' yrs)');
  set('dp_int', fmtUSD(totalInt));
  set('dp_tot', fmtUSD(totalPaid));
  set('dp_date', date.toLocaleDateString('en-US', {month:'short', year:'numeric'}));
  set('dp_min', fmtUSD(minPay + 1));
  showResult('dp_res');
}

function calcSTH() {
  const sal = num('sth_sal'), hrs = num('sth_hrs'), wks = num('sth_wks');
  const totalHrs = hrs * wks;
  const hourly = sal / totalHrs;
  set('sth_hr', fmtUSD(hourly) + '/hr');
  set('sth_day', fmtUSD(hourly * 8));
  set('sth_wk', fmtUSD(hourly * hrs));
  set('sth_mo', fmtUSD(sal / 12));
  set('sth_yr', fmtUSD(sal));
  showResult('sth_res');
}

function calc401k() {
  const age = num('k401_age'), ret = num('k401_ret'), bal = num('k401_bal');
  const con = num('k401_con'), matchPct = num('k401_match') / 100;
  const r = num('k401_r') / 100 / 12;
  const yrs = ret - age;
  if(yrs <= 0) return;
  const months = yrs * 12;
  const empMatch = con * matchPct;
  const totalCon = con + empMatch;
  let balance = bal;
  let yourTotal = 0, empTotal = 0;
  for(let i = 0; i < months; i++) {
    balance = balance * (1 + r) + totalCon;
    yourTotal += con;
    empTotal += empMatch;
  }
  const growth = balance - bal - yourTotal - empTotal;
  set('k401_final', fmtUSD(balance));
  set('k401_yours', fmtUSD(yourTotal));
  set('k401_emp', fmtUSD(empTotal));
  set('k401_growth', fmtUSD(growth));
  set('k401_yrs', yrs + ' years');
  showResult('k401_res');
}

function calcRoth() {
  const age = num('roth_age'), ret = num('roth_ret'), con = num('roth_con');
  const bal = num('roth_bal'), r = num('roth_r') / 100;
  const yrs = ret - age;
  if(yrs <= 0) return;
  let balance = bal;
  for(let i = 0; i < yrs; i++) { balance = (balance + con) * (1 + r); }
  const totalCon = con * yrs + bal;
  const growth = balance - totalCon;
  const taxSave = growth * 0.22;

function calcBreakEven() {

  const units = Math.ceil(fixed / cm);
  const rev = units * price;
  const cmr = ((cm / price) * 100).toFixed(1) + '%';

  set('be_units', units.toLocaleString() + ' units');

// ===== NEW HEALTH FUNCTIONS =====
function calcBodyFat() {
  const wt = num('bf_wt'), ht = num('bf_ht'), age = num('bf_age');
  const gender = document.getElementById('bf_gender').value;
  const bmi = wt / ((ht/100)**2);
  // Deurenberg formula
  const bf = (1.20 * bmi) + (0.23 * age) - (10.8 * (gender==='m'?1:0)) - 5.4;
  const fatMass = (bf/100) * wt;
  const leanMass = wt - fatMass;
  const idealRange = gender==='m' ? '8–19%' : '21–33%';
  let cat;
  if(gender==='m') cat = bf<6?'Essential':bf<14?'Athletic':bf<18?'Fit ✅':bf<25?'Average':bf<31?'Obese':'Extremely Obese';
  else cat = bf<14?'Essential':bf<21?'Athletic':bf<25?'Fit ✅':bf<32?'Average':bf<39?'Obese':'Extremely Obese';
  set('bf_val', bf.toFixed(1)+'%');
  set('bf_fat', fatMass.toFixed(1)+' kg');
  set('bf_lean', leanMass.toFixed(1)+' kg');
  set('bf_cat', cat);
  set('bf_ideal', idealRange);
  showResult('bf_res');
}

function calcPregnancy() {
  const lmpVal = document.getElementById('preg_lmp').value;
  const cycle = num('preg_cycle');
  if(!lmpVal) return;
  const lmp = new Date(lmpVal);
  const conception = new Date(lmp); conception.setDate(lmp.getDate() + 14 + (cycle-28));
  const due = new Date(lmp); due.setDate(lmp.getDate() + 280 + (cycle-28));
  const today = new Date();
  const weeksPreg = Math.floor((today - lmp) / (7*24*3600*1000));
  const daysLeft = Math.ceil((due - today) / (24*3600*1000));
  const trim = weeksPreg < 13 ? '1st Trimester' : weeksPreg < 27 ? '2nd Trimester' : '3rd Trimester';
  const fmt2 = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  set('preg_due', fmt2(due));
  set('preg_con', fmt2(conception));
  set('preg_wk', weeksPreg > 0 ? 'Week '+weeksPreg : 'Not yet');
  set('preg_trim', trim);
  set('preg_days', daysLeft > 0 ? daysLeft+' days' : 'Overdue!');
  showResult('preg_res');
}

function calcOvulation() {
  const lmpVal = document.getElementById('ov_lmp').value;
  const cycle = num('ov_cycle');
  if(!lmpVal) return;
  const lmp = new Date(lmpVal);
  const ovDate = new Date(lmp); ovDate.setDate(lmp.getDate() + cycle - 14);
  const fertStart = new Date(ovDate); fertStart.setDate(ovDate.getDate() - 5);
  const fertEnd = new Date(ovDate); fertEnd.setDate(ovDate.getDate() + 1);

  set('ov_date', fmt2(ovDate));

function calcHeartRate() {
  const age = num('hr_age'), rest = num('hr_rest');
  const max = 220 - age;
  const hrr = max - rest; // Heart Rate Reserve
  const z = (lo,hi) => {
    const l = Math.round(rest + hrr*lo), h = Math.round(rest + hrr*hi);
    return l+' – '+h+' bpm';
  };
  set('hr_max', max+' bpm');
  set('hr_z1', z(0.50,0.60));
  set('hr_z2', z(0.60,0.70));
  set('hr_z3', z(0.70,0.80));
  set('hr_z4', z(0.80,0.90));
  showResult('hr_res');
}

function calcMacro() {
  const wt=num('mac_wt'), ht=num('mac_ht'), age=num('mac_age');
  const gen=document.getElementById('mac_gender').value;
  const act=parseFloat(document.getElementById('mac_act').value);
  const goal=document.getElementById('mac_goal').value;
  const bmr = gen==='m' ? 10*wt+6.25*ht-5*age+5 : 10*wt+6.25*ht-5*age-161;
  let tdee = bmr * act;
  if(goal==='cut') tdee -= 500;
  else if(goal==='bulk') tdee += 300;
  const prot = Math.round(wt * 2.0);
  const fat = Math.round(tdee * 0.25 / 9);
  const protCals = prot * 4, fatCals = fat * 9;
  const carb = Math.round((tdee - protCals - fatCals) / 4);
  set('mac_cal', Math.round(tdee)+' kcal');
  set('mac_prot', prot+'g');
  set('mac_carb', carb+'g');
  set('mac_fat', fat+'g');
  set('mac_bmr', Math.round(bmr)+' kcal');
  showResult('mac_res');
}

function calcGrade() {
  const rows = document.querySelectorAll('.grade-row');

  rows.forEach(r => {
    const score = parseFloat(r.querySelector('.gr-score').value)||0;

  let gpa = avg>=90?4.0:avg>=85?3.7:avg>=80?3.3:avg>=77?3.0:avg>=73?2.7:avg>=70?2.3:avg>=67?2.0:avg>=60?1.0:0;
  let status = avg>=90?'🏆 Excellent':avg>=80?'✅ Good':avg>=70?'📘 Passing':'⚠️ At Risk';
  set('grade_avg', avg.toFixed(2)+'%');

function calcStudyHours() {

function calcReadingSpeed() {

  set('read_time', h>0?`${h}h ${m}m`:`${m} mins`);

function calcWPM() {
  const text = document.getElementById('wpm_text').value.trim();
  const secs = num('wpm_secs'), errors = num('wpm_errors');
  const words = text.split(/\s+/).filter(Boolean).length;
  const grossWPM = Math.round((words / secs) * 60);
  const netWPM = Math.max(0, grossWPM - Math.round((errors/secs)*60));
  const chars = text.length;
  const cpm = Math.round((chars/secs)*60);
  const acc = Math.max(0, 100 - (errors/words*100)).toFixed(1)+'%';
  let level = netWPM<30?'Beginner':netWPM<50?'Average':netWPM<70?'Good':netWPM<90?'Fast ⚡':'Expert 🏆';
  set('wpm_val', netWPM+' WPM');
  set('wpm_gross', grossWPM+' WPM');
  set('wpm_acc', acc);
  set('wpm_cpm', cpm+' CPM');
  set('wpm_level', level);
  showResult('wpm_res');
}

function calcDPS() {

  const saved = num('dps_saved'), monthly = num('dps_monthly'), r = num('dps_r')/100/12;
  const needed = home * pct;
  const gap = Math.max(0, needed - saved);
  let months = 0, balance = saved;
  while(balance < needed && months < 600) {
    balance = balance*(1+r) + monthly;
    months++;
  }
  const interest = balance - saved - monthly*months;
  const date = new Date(); date.setMonth(date.getMonth()+months);
  set('dps_months', months > 0 ? months+' months' : 'Already reached!');
  set('dps_need', fmtUSD(needed));
  set('dps_gap', fmtUSD(gap));
  set('dps_date', date.toLocaleDateString('en-US',{month:'short',year:'numeric'}));
  set('dps_int', fmtUSD(Math.max(0,interest)));
  showResult('dps_res');
}
