function slug(name) { return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,''); }
function getCatIdForCalc(calcName) {
  var s = slug(calcName);
  for (var i=0; i<categories.length; i++) {
    if (categories[i].calcs.some(function(c){ return slug(c)===s; })) return categories[i].id;
  }
  return 'calc';
}

function toggleCat(el) {
  el.parentElement.classList.toggle('open');
  el.classList.toggle('active');
}

function openCalc(id, name, cat, icon) {
  document.getElementById('home-page').style.display = 'none';
  document.querySelectorAll('.calc-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.calc-item').forEach(i => i.classList.remove('active'));

  let page = document.getElementById('page-'+id);
  if(!page) {
    page = buildCalcPage(id, name, cat, icon);
    pagesDiv.appendChild(page);
  }
  page.classList.add('active');

  const items = document.querySelectorAll('.calc-item');
  items.forEach(i => { if(i.textContent.trim() === name) i.classList.add('active'); });

  document.getElementById('topbarTitle').textContent = name;
  document.title = name + ' | Free Calculator – CalculatorHub';

}

var _catId = getCatIdForCalc(name);
history.pushState(
  { calc: id, cat: _catId },
  '',
  '/' + _catId + '/' + id
);
  
  if(window.innerWidth <= 768) closeMobile();
}

function goHome() {
    document.getElementById('home-page').style.display = 'block';
    document.querySelectorAll('.calc-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.calc-item').forEach(i => i.classList.remove('active'));

);
history.pushState({}, '', '/');
}

window.addEventListener('popstate', function() {
  var path = window.location.pathname;
  if(path === '/' || path === '/index.html' || path === '') {
    goHome();
  } else if(path.indexOf('/blog') === 0) {
    var bid = path.replace('/blog/','').replace('/blog','') || 'list';
    loadBlogById(bid);
  } else {
    var parts = path.replace(/^\//, '').replace(/\.html$/, '').split('/');
    var id = parts[parts.length - 1];
    if(id) loadCalcById(id); else goHome();
  }
});

function loadCalcById(id) {
  let found = false;
  categories.forEach(cat => {
    cat.calcs.forEach(c => {
      if(slug(c) === id) { found = true; openCalcSilent(id, c, cat.name, cat.icon); }
    });
  });
  if(!found) goHome();
}

function openCalcSilent(id, name, cat, icon) {
  document.getElementById('home-page').style.display = 'none';
  document.querySelectorAll('.calc-page').forEach(p => p.classList.remove('active'));

  let page = document.getElementById('page-'+id);
  if(!page) { page = buildCalcPage(id, name, cat, icon); pagesDiv.appendChild(page); }
  page.classList.add('active');
  document.querySelectorAll('.calc-item').forEach(i => { if(i.textContent.trim() === name) i.classList.add('active'); });
  document.getElementById('topbarTitle').textContent = name;
  document.title = name + ' | Free Calculator – CalculatorHub';

}

(function() {
  var path = window.location.pathname;

function fmt(n) {
  if(isNaN(n)) return '—';
  if(n >= 1e7) return '₹' + (n/1e7).toFixed(2) + ' Cr';
  if(n >= 1e5) return '₹' + (n/1e5).toFixed(2) + ' L';
  return '₹' + n.toLocaleString('en-IN', {maximumFractionDigits:2});
}

// ============ CALC LOGIC ============
let gstMode = 'exc', liMode = 'si', pctMode = 0;

function setGSTTab(m) {
  gstMode = m;
  document.getElementById('gst_exc').classList.toggle('active', m==='exc');
  document.getElementById('gst_inc').classList.toggle('active', m==='inc');
}

function setLITab(m) {
  liMode = m;
  document.getElementById('li_si').classList.toggle('active', m==='si');
  document.getElementById('li_ci').classList.toggle('active', m==='ci');
}

function setPctTab(n, el) {
  pctMode = n;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  [0,1,2].forEach(i => document.getElementById('pct'+i).style.display = i===n?'block':'none');
}

function calcEMI() {
  const P=num('emi_p'), r=num('emi_r')/12/100, n=num('emi_t');
  const emi = P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
  const tot = emi*n, int = tot-P;
  set('emi_val', '₹'+emi.toFixed(2));
  set('emi_p2', fmt(P));
  set('emi_int', fmt(int));
  set('emi_tot', fmt(tot));
  set('emi_pct', ((int/P)*100).toFixed(1)+'%');
  showResult('emi_res');
}

function calcSIP() {
  const m=num('sip_m'), r=num('sip_r')/12/100, n=num('sip_t')*12;
  const fv = m*((Math.pow(1+r,n)-1)/r)*(1+r);
  const inv = m*n;
  set('sip_fv', fmt(fv));
  set('sip_inv', fmt(inv));
  set('sip_gain', fmt(fv-inv));
  set('sip_ret', (((fv-inv)/inv)*100).toFixed(1)+'%');
  set('sip_mo', n+' months');
  showResult('sip_res');
}

function calcFD() {
  const P=num('fd_p'), r=num('fd_r')/100, t=num('fd_t'), n=parseInt(val('fd_freq'));
  const mat = P*Math.pow(1+r/n, n*t);
  set('fd_mat', fmt(mat));
  set('fd_p2', fmt(P));
  set('fd_int', fmt(mat-P));
  showResult('fd_res');
}

function calcRD() {
  const m=num('rd_m'), r=num('rd_r')/400, n=num('rd_t');
  const mat = m*(Math.pow(1+r,n)-1)/(1-(Math.pow(1+r,-1/3)));
  const dep = m*n;
  set('rd_mat', fmt(mat));
  set('rd_dep', fmt(dep));
  set('rd_int', fmt(mat-dep));
  showResult('rd_res');
}

function calcGST() {
  const a=num('gst_a'), r=num('gst_r')/100;
  let base, gstAmt;
  if(gstMode==='exc') { base=a; gstAmt=a*r; }
  else { base=a/(1+r); gstAmt=a-base; }
  const tot = base+gstAmt;
  set('gst_tot', fmt(tot));
  set('gst_base', fmt(base));
  set('gst_cgst', fmt(gstAmt/2));
  set('gst_sgst', fmt(gstAmt/2));
  set('gst_gst', fmt(gstAmt));
  showResult('gst_res');
}

function calcTax() {
  const inc=num('tax_inc'), reg=val('tax_reg'), ded=num('tax_ded');
  let taxable = inc;
  let tax = 0;
  if(reg==='old') {
    taxable = Math.max(0, inc - ded - 50000); // std deduction
    const slabs = [[250000,0],[250000,0.05],[500000,0.2],[Infinity,0.3]];
    let rem = Math.max(0, taxable-250000);
    if(taxable>250000) { let t=Math.min(rem,250000)*0.05; tax+=t; rem-=250000; }
    if(rem>0) { let t=Math.min(rem,500000)*0.2; tax+=t; rem-=500000; }
    if(rem>0) tax+=rem*0.3;
  } else {
    taxable = Math.max(0, inc - 75000); // std deduction new
    const slabs = [[300000,0],[400000,0.05],[300000,0.1],[300000,0.15],[300000,0.2],[Infinity,0.3]];
    let rem = taxable;
    for(const [limit, rate] of slabs) {
      if(rem<=0) break;
      const chunk = Math.min(rem, limit);
      tax += chunk * rate;
      rem -= chunk;
    }
  }
  const cess = tax*0.04;
  const total = tax+cess;
  set('tax_txb', fmt(taxable));
  set('tax_base', fmt(tax));
  set('tax_cess', fmt(cess));
  set('tax_val', fmt(total));
  set('tax_mo', fmt(total/12));
  showResult('tax_res');
}

function calcCAGR() {
  const i=num('cagr_i'), f=num('cagr_f'), t=num('cagr_t');
  const cagr = (Math.pow(f/i, 1/t)-1)*100;
  set('cagr_val', cagr.toFixed(2)+'%');
  set('cagr_grow', (((f-i)/i)*100).toFixed(1)+'%');
  set('cagr_abs', fmtUSD(f-i));
  showResult('cagr_res');
}

const rates = {INR:1,USD:83.5,EUR:91,GBP:106,JPY:0.56,AED:22.7,SGD:62,CAD:61.5};
function calcCur() {
  const a=num('cur_amt'), f=val('cur_from'), t=val('cur_to');
  const res = a * (rates[f]/rates[t]);
  const sym = {INR:'₹',USD:'$',EUR:'€',GBP:'£',JPY:'¥',AED:'د.إ',SGD:'S$',CAD:'C$'};
  set('cur_val', (sym[t]||'') + res.toLocaleString('en-IN',{maximumFractionDigits:2}));
  set('cur_rate', '1 '+f+' = '+(rates[f]/rates[t]).toFixed(4)+' '+t);
  showResult('cur_res');
}

function calcLI() {
  const p=num('li_p'), r=num('li_r')/100, t=num('li_t');
  let int, tot;
  if(liMode==='si') { int=p*r*t; tot=p+int; }
  else { tot=p*Math.pow(1+r,t); int=tot-p; }
  set('li_tot', fmtUSD(tot));
  set('li_p2', fmtUSD(p));
  set('li_int', fmtUSD(int));
  showResult('li_res');
}

function calcLE() {
  const inc=num('le_inc'), emi=num('le_emi'), r=num('le_r')/12/100, t=num('le_t')*12;
  const maxEMI = inc*0.5 - emi;
  const maxLoan = maxEMI*(Math.pow(1+r,t)-1)/(r*Math.pow(1+r,t));
  const foir = ((emi/inc)*100).toFixed(1);
  set('le_max', fmtUSD(Math.max(0,maxLoan)));
  set('le_maxemi', fmtUSD(Math.max(0,maxEMI)));
  set('le_foir', foir+'%');
  showResult('le_res');
}

function calcInf() {
  const a=num('inf_a'), r=num('inf_r')/100, t=num('inf_t');
  const fv = a*Math.pow(1+r,t);
  set('inf_fv', fmtUSD(fv));
  set('inf_lost', fmtUSD(fv-a));
  set('inf_pp', fmtUSD(a/Math.pow(1+r,t)));
  showResult('inf_res');
}

function calcCI() {
  const p=num('ci_p'), r=num('ci_r')/100, t=num('ci_t'), n=parseInt(val('ci_n'));
  const mat = p*Math.pow(1+r/n, n*t);
  set('ci_mat', fmtUSD(mat));
  set('ci_p2', fmtUSD(p));
  set('ci_int', fmtUSD(mat-p));
  showResult('ci_res');
}

function calcHRA() {
  const basic=num('hra_basic'), rec=num('hra_rec'), rent=num('hra_rent'), city=val('hra_city');
  const pct = city==='metro' ? 0.5 : 0.4;
  const ex = Math.min(rec, basic*pct, Math.max(0,rent-basic*0.1));
  set('hra_ex', fmt(ex));
  set('hra_r2', fmt(rec));
  set('hra_tax', fmt(rec-ex));
  showResult('hra_res');
}

function calcTip() {
  const b=num('tip_b'), p=num('tip_p')/100, s=num('tip_s');
  const tip=b*p, tot=b+tip;
  set('tip_tip', fmtUSD(tip));
  set('tip_tot', fmtUSD(tot));
  set('tip_pp', fmtUSD(tot/s));
  showResult('tip_res');
}

function calcDisc() {
  const p=num('disc_p'), d=num('disc_d')/100;
  const save=p*d, fp=p-save;
  set('disc_fp', fmtUSD(fp));
  set('disc_save', fmtUSD(save));
  set('disc_pct', (d*100).toFixed(0)+'% off');
  showResult('disc_res');
}

function calcPct() {
  let res;
  if(pctMode===0) res = (num('pct_a')/100)*num('pct_b');
  else if(pctMode===1) res = ((num('pct_d')-num('pct_c'))/num('pct_c')*100).toFixed(2)+'%';
  else res = (num('pct_e')/num('pct_f')*100).toFixed(2)+'%';
  set('pct_val', typeof res==='number'?res.toFixed(2):res);
  showResult('pct_res');
}

function calcBMI() {
  const w=num('bmi_w'), h=num('bmi_h')/100;
  const bmi=(w/(h*h));
  const cat = bmi<18.5?'Underweight':bmi<25?'Normal ✅':bmi<30?'Overweight':'Obese';
  const minW=(18.5*h*h), maxW=(24.9*h*h);
  set('bmi_val', bmi.toFixed(1));
  set('bmi_cat', cat);
  set('bmi_ideal', minW.toFixed(1)+'–'+maxW.toFixed(1)+' kg');
  showResult('bmi_res');
}

function calcAge() {
  const parts = val('age_dob').split('/');
  const dob = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  const now = new Date();
  let y=now.getFullYear()-dob.getFullYear(), m=now.getMonth()-dob.getMonth(), d=now.getDate()-dob.getDate();
  if(d<0){m--;d+=30;}if(m<0){y--;m+=12;}
  const days=Math.floor((now-dob)/86400000);
  const days_=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const next = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());
  if(next<now) next.setFullYear(now.getFullYear()+1);
  const daysLeft=Math.ceil((next-now)/86400000);
  set('age_val', y+' yrs '+m+' mo '+d+' d');
  set('age_mo', (y*12+m)+' months');
  set('age_dy', days.toLocaleString()+' days');
  set('age_nb', daysLeft+' days away');
  set('age_day', days_[dob.getDay()]);
  showResult('age_res');
}

function calcCal() {
  const age=num('cal_age'), w=num('cal_w'), h=num('cal_h'), gen=val('cal_gen'), act=parseFloat(val('cal_act'));
  const bmr = gen==='m' ? 10*w+6.25*h-5*age+5 : 10*w+6.25*h-5*age-161;
  const tdee = bmr*act;
  set('cal_bmr', Math.round(bmr)+' kcal');
  set('cal_tdee', Math.round(tdee)+' kcal');
  set('cal_lose', Math.round(tdee-500)+' kcal');
  set('cal_gain', Math.round(tdee+500)+' kcal');
  set('cal_main', Math.round(tdee)+' kcal');
  showResult('cal_res');
}

function calcWat() {
  const w=num('wat_w'), act=parseFloat(val('wat_act'));
  const liters=(w*0.033*act);
  set('wat_val', liters.toFixed(2)+' L');
  set('wat_gl', Math.ceil(liters/0.25)+' glasses');
  set('wat_bt', (liters).toFixed(1)+' bottles');
  showResult('wat_res');
}

function calcIBW() {
  const h=num('ibw_h'), g=val('ibw_g');
  const inches=(h/2.54)-60;
  const ibw = g==='m' ? 50+2.3*inches : 45.5+2.3*inches;
  const minW=ibw*0.9, maxW=ibw*1.1;
  set('ibw_val', ibw.toFixed(1)+' kg');
  set('ibw_range', minW.toFixed(1)+'–'+maxW.toFixed(1)+' kg');
  showResult('ibw_res');
}

function calcSlp() {
  const t=val('slp_wake').split(':');
  const wakeMin=parseInt(t[0])*60+parseInt(t[1]);
  const fallAsleep=14;
  const cycles=[6,5,4,3];
  const times=cycles.map(c=>{
    let mins=wakeMin-(c*90+fallAsleep);
    if(mins<0) mins+=1440;
    const h=Math.floor(mins/60)%24, m=mins%60;
    return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+' ('+c+' cycles)';
  });
  set('slp_val', times.join(' | '));
  showResult('slp_res');
}

function calcStud() {
  const scores=[num('s1'),num('s2'),num('s3'),num('s4'),num('s5')];
  const max=num('smax'), tot=scores.reduce((a,b)=>a+b,0);
  const pct=(tot/(max*5))*100;
  const grade=pct>=90?'A+':pct>=80?'A':pct>=70?'B':pct>=60?'C':pct>=50?'D':'F';
  set('stud_tot', tot+'/'+(max*5));
  set('stud_pct', pct.toFixed(2)+'%');
  set('stud_grade', grade);
  showResult('stud_res');
}

function calcGPA() {
  const grades=[...document.querySelectorAll('.gpa-grade')].map(s=>parseFloat(s.value));
  const credits=[...document.querySelectorAll('.gpa-credit')].map(i=>parseFloat(i.value));
  let wt=0, cr=0;
  grades.forEach((g,i)=>{wt+=g*credits[i]; cr+=credits[i];});
  const gpa=wt/cr;
  const stand=gpa>=3.7?'Summa Cum Laude':gpa>=3.3?'Magna Cum Laude':gpa>=3?'Cum Laude':gpa>=2?'Good Standing':'At Risk';
  set('gpa_val', gpa.toFixed(2));
  set('gpa_cr', cr+' credits');
  set('gpa_stand', stand);
  showResult('gpa_res');
}

function calcCGPA() {
  const c=num('cgpa_v'), s=parseInt(val('cgpa_scale'));
  let pct;
  if(s===10) pct=c*9.5;
  else pct=(c/4)*100;
  const grade=pct>=90?'Outstanding':pct>=75?'Distinction':pct>=60?'First Class':pct>=50?'Second Class':'Pass';
  set('cgpa_pct', pct.toFixed(2)+'%');
  set('cgpa_grade', grade);
  set('cgpa_eq', pct.toFixed(1)+'%');
  showResult('cgpa_res');
}

function calcYT() {
  const v=num('yt_v'), rpm=num('yt_rpm'), niche=parseFloat(val('yt_niche'));
  const day=v/1000*rpm*niche, mo=day*30, yr=mo*12;
  set('yt_day', fmtUSD(day));
  set('yt_mo', fmtUSD(mo));
  set('yt_yr', fmtUSD(yr));
  showResult('yt_res');
}

function calcIG() {
  const f=num('ig_f'), er=num('ig_er')/100, p=num('ig_p');
  const pp=(f/1000)*(f<50000?10:f<500000?50:100)*er*10;
  const mo=pp*p;
  set('ig_pp', fmtUSD(pp));
  set('ig_mo', fmtUSD(mo));
  set('ig_yr', fmtUSD(mo*12));
  showResult('ig_res');
}

function calcTT() {
  const f=num('tt_f'), v=num('tt_v'), p=num('tt_p');
  const cf=v*p*0.00003;
  const bd=f>=10000?(f/1000)*50:0;
  const mo=cf+bd;
  set('tt_cf', fmtUSD(cf));
  set('tt_bd', fmtUSD(bd));
  set('tt_mo', fmtUSD(mo));
  showResult('tt_res');
}

function calcAds() {
  const pv=num('ads_pv'), ctr=num('ads_ctr')/100, cpc=num('ads_cpc');
  const clicks=pv*ctr, mo=clicks*cpc;
  set('ads_cl', Math.round(clicks).toLocaleString());
  set('ads_mo', fmtUSD(mo));
  set('ads_yr', fmtUSD(mo*12));
  showResult('ads_res');
}

function nameSeed(name) {
  return name.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
}

function calcLove() {
  const a=val('love_a').trim(), b=val('love_b').trim();
  if(!a||!b) return;
  const seed=(nameSeed(a)+nameSeed(b))%100+1;
  const pct=Math.min(99,Math.max(1,seed));

  'calorie-calculator': {
    what: `A Calorie Calculator estimates your BMR (Basal Metabolic Rate) — calories your body burns at rest — and your TDEE (Total Daily Energy Expenditure) based on your activity level. Use this to set calorie goals for weight loss, maintenance, or gain.`,
    formula: `BMR (Mifflin-St Jeor):\nMen: 10×W + 6.25×H − 5×A + 5\nWomen: 10×W + 6.25×H − 5×A − 161\n\nTDEE = BMR × Activity Multiplier\nWeight Loss = TDEE − 500 kcal/day`,
    benefits: ['Set evidence-based calorie targets','Understand your body\'s energy needs','Plan diet for weight loss or muscle gain','No guesswork — science-backed formula','Adjusts for different activity levels'],
    faqs: [
      { q: 'How accurate is this calorie calculator?', a: 'The Mifflin-St Jeor equation is considered the most accurate for most people, with ±10% variance. Individual metabolism can vary.' },
      { q: 'How many calories to lose 1 kg per week?', a: 'A deficit of ~7,700 kcal is needed to lose 1 kg. That\'s roughly 1,100 kcal/day deficit. A safe and sustainable rate is 0.5 kg/week (500 kcal deficit/day).' },
      { q: 'Should I eat below BMR?', a: 'No. Eating below BMR can slow metabolism, cause muscle loss, nutrient deficiencies, and is generally unsafe without medical supervision.' },
      { q: 'What activity multiplier should I choose?', a: 'Be honest — most people overestimate their activity. "Lightly active" (1–3 days exercise) is accurate for most office workers who exercise a few days a week.' }

  'water-intake-calculator': {
    what: `A Water Intake Calculator estimates the daily water intake your body needs based on your weight and activity level. Proper hydration is essential for metabolism, temperature regulation, joint lubrication, and overall health.`,

      { q: 'Signs of dehydration to watch for?', a: 'Dark yellow urine, dry mouth, fatigue, dizziness, and headaches are common signs. Urine should ideally be pale yellow for adequate hydration.' },

  'ideal-body-weight-calculator': {
    what: `Ideal Body Weight (IBW) is an estimated weight considered optimal for your height and gender. Based on the Devine formula used in clinical settings, IBW helps set realistic weight goals and is used in medicine for drug dosing and health assessments.`,
    formula: `Men: IBW = 50 + 2.3 × (Height in inches − 60)\nWomen: IBW = 45.5 + 2.3 × (Height in inches − 60)\n\nHealthy Range = IBW ± 10%\n(Valid for heights above 5 feet / 152 cm)`,
    benefits: ['Set a realistic, healthy weight target','Used in clinical drug dosing','Helps assess cardiovascular and metabolic risk','Better goal-setting than arbitrary numbers','Accounts for both height and gender'],
    faqs: [
      { q: 'Is IBW the same as target body weight?', a: 'IBW is a clinical estimate. Target body weight is personal and may differ based on muscle mass, bone density, and body composition goals.' },
      { q: 'What if I\'m below 5 feet tall?', a: 'The Devine formula is designed for heights above 5 feet. For shorter individuals, adjusted or alternative formulas may be more appropriate.' },
      { q: 'Should I aim exactly for IBW?', a: 'The healthy range (IBW ±10%) is more realistic. Being within this range is considered healthy; exact IBW isn\'t a strict requirement.' },
      { q: 'How does IBW differ from BMI?', a: 'BMI uses both weight and height for a ratio. IBW provides a single target weight for a given height and gender, used more in clinical settings.' }

  'sleep-calculator': {
    what: `A Sleep Calculator helps you find the optimal time to go to sleep based on when you need to wake up. It works by aligning your sleep schedule with your natural sleep cycles, each lasting approximately 90 minutes, so you wake up at the end of a cycle feeling refreshed.`,
    formula: `Bedtime = Wake Time − (Sleep Cycles × 90 min) − 14 min\n\n14 minutes = average time to fall asleep\nOptimal cycles: 5–6 cycles (7.5–9 hours)\nMinimum: 4 cycles (6 hours)`,
    benefits: ['Wake up refreshed by timing sleep cycles','Reduce groggy morning feeling','Optimize sleep for productivity','Understand your natural sleep rhythm','Works backward from your wake-up time'],
    faqs: [
      { q: 'How long is one sleep cycle?', a: 'One sleep cycle lasts approximately 90 minutes and includes light sleep, deep sleep (slow-wave), and REM sleep stages.' },
      { q: 'How many sleep cycles do I need?', a: 'Adults need 5–6 complete cycles (7.5–9 hours). Waking mid-cycle causes sleep inertia — that groggy feeling in the morning.' },
      { q: 'What is REM sleep?', a: 'REM (Rapid Eye Movement) sleep is when most dreaming occurs. It is crucial for memory consolidation, learning, emotional processing, and creativity.' },
      { q: 'Can I catch up on sleep on weekends?', a: 'Partially. While some recovery sleep is possible, chronic sleep deprivation has cumulative effects that aren\'t fully reversed by weekend catch-up sleep.' }

  'student-calculator': {
    what: `A Student Calculator computes your total marks, percentage, and letter grade across multiple subjects. It\'s useful for quickly understanding your academic performance and where you stand grade-wise at the end of a semester or exam.`,
    formula: `Total Marks = Sum of all subject scores\nPercentage = (Total Marks / Max Possible) × 100\n\nGrade:\n≥90%: A+ | ≥80%: A | ≥70%: B\n≥60%: C | ≥50%: D | <50%: F`,

      { q: 'What percentage is required for distinction?', a: 'Typically, 75% and above is distinction, 60%–75% is first class. This varies by institution and university.' },

  'gpa-calculator': {
    what: `GPA (Grade Point Average) is a standardized measure of academic achievement used primarily in the US education system. It is calculated by averaging the grade points earned across all courses, weighted by the number of credits each course carries.`,
    formula: `GPA = Σ(Grade Points × Credits) / Σ(Credits)\n\nGrade Points:\nA = 4.0 | A- = 3.7 | B+ = 3.3\nB = 3.0 | B- = 2.7 | C+ = 2.3\nC = 2.0 | D = 1.0 | F = 0`,

      { q: 'What is the difference between GPA and CGPA?', a: 'GPA is for a single semester. CGPA (Cumulative GPA) is the average across all semesters of study — the overall academic performance indicator.' },
      { q: 'Can I raise my GPA in the final year?', a: 'Yes, but the impact diminishes over time. Later semesters have less weight on the cumulative GPA. Focus on courses with more credits.' },

  'cgpa-to-percentage': {

  'mortgage-calculator': {

  'credit-card-payoff-calculator': {

    formula: `Months = −log(1 − Balance × r / Payment) / log(1 + r)\n\nWhere r = APR ÷ 12 ÷ 100\n\nTotal Interest = (Payment × Months) − Balance\nMin viable payment: > Balance × Monthly Rate`,

      { q: 'What is a good credit card APR?', a: 'Below 15% is considered low. The US average is 20–27%. If your APR is higher, consider a 0% balance transfer card to save significantly on interest.' },
