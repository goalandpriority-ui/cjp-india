function calcProfitMargin() {
  const rev = num('pm_rev'), cogs = num('pm_cogs'), opex = num('pm_opex');
  const grossProfit = rev - cogs;
  const grossMargin = rev > 0 ? ((grossProfit/rev)*100).toFixed(1)+'%' : '—';
  const ebit = grossProfit - opex;
  const netMargin = rev > 0 ? ((ebit/rev)*100).toFixed(1)+'%' : '—';
  set('pm_net', netMargin);
  set('pm_gross', fmtUSD(grossProfit));
  set('pm_grossm', grossMargin);
  set('pm_ebit', fmtUSD(ebit));
  set('pm_netval', fmtUSD(ebit));
  showResult('pm_res');
}

let markupMode = 0;
function setMarkupTab(n) {
  markupMode = n;
  document.getElementById('mk_tab0').classList.toggle('active',n===0);
  document.getElementById('mk_tab1').classList.toggle('active',n===1);
  document.getElementById('mk_mode0').style.display = n===0?'block':'none';
  document.getElementById('mk_mode1').style.display = n===1?'block':'none';
}
function calcMarkup() {
  let cost, sellPrice, markup;
  if(markupMode===0) {
    cost = num('mk_cost'); markup = num('mk_markup');
    sellPrice = cost * (1 + markup/100);
  } else {
    cost = num('mk_cost2'); sellPrice = num('mk_price');
    markup = ((sellPrice-cost)/cost*100);
  }
  const profit = sellPrice - cost;
  const margin = ((profit/sellPrice)*100).toFixed(1)+'%';
  const rev10k = profit > 0 ? fmtUSD(10000/profit*sellPrice) : '—';
  set('mk_sell', fmtUSD(sellPrice));
  set('mk_profit', fmtUSD(profit));
  set('mk_margin', margin);
  set('mk_mkpct', markup.toFixed(1)+'%');
  set('mk_rev10k', rev10k);
  showResult('mk_res');
}

function calcRevenue() {
  const units = num('rev_units'), price = num('rev_price');
  const disc = num('rev_disc')/100, ref = num('rev_ref')/100;
  const gross = units * price;
  const discAmt = gross * disc;
  const afterDisc = gross - discAmt;
  const refAmt = afterDisc * ref;
  const net = afterDisc - refAmt;
  const arpu = units > 0 ? net/units : 0;
  set('rev_net', fmtUSD(net));
  set('rev_gross', fmtUSD(gross));
  set('rev_discamt', fmtUSD(discAmt));
  set('rev_refamt', fmtUSD(refAmt));
  set('rev_arpu', fmtUSD(arpu));
  showResult('rev_res');
}

function calcBurnRate() {
  const cash = num('burn_cash'), rev = num('burn_rev');
  const pay = num('burn_pay'), op = num('burn_op'), oth = num('burn_oth');
  const grossBurn = pay + op + oth;
  const netBurn = grossBurn - rev;
  const months = netBurn > 0 ? Math.floor(cash/netBurn) : 999;
  const outDate = new Date(); outDate.setMonth(outDate.getMonth()+months);
  set('burn_runway', netBurn<=0?'Profitable! ✅':months+' months');
  set('burn_gross', fmtUSD(grossBurn)+'/mo');
  set('burn_net', fmtUSD(netBurn)+'/mo');
  set('burn_months', months < 999 ? months+' months' : '∞');
  set('burn_date', netBurn>0 ? outDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}) : 'N/A');
  showResult('burn_res');
}

function calcValuation() {
  const rev = num('val_rev'), profit = num('val_profit');
  const rmul = num('val_rmul'), pe = num('val_pe');
  const ind = parseFloat(document.getElementById('val_ind').value);
  const revVal = rev * rmul * ind;
  const earnVal = profit * pe * ind;
  const margin = rev > 0 ? ((profit/rev)*100).toFixed(1)+'%' : '—';
  const adj = (revVal + earnVal) / 2;
  const lo = fmtUSD(Math.min(revVal,earnVal));
  const hi = fmtUSD(Math.max(revVal,earnVal));
  set('val_range', lo + ' – ' + hi);
  set('val_revval', fmtUSD(revVal));
  set('val_earnval', fmtUSD(earnVal));
  set('val_margin', margin);
  set('val_adj', fmtUSD(adj));
  showResult('val_res');
}

function calcROE() {
  const income = num('roe_income'), equity = num('roe_equity');
  const assets = num('roe_assets'), rev = num('roe_rev');
  const roe = equity > 0 ? ((income/equity)*100).toFixed(2)+'%' : '—';
  const npm = rev > 0 ? ((income/rev)*100).toFixed(2)+'%' : '—';
  const at = assets > 0 ? (rev/assets).toFixed(2)+'x' : '—';
  const em = equity > 0 ? (assets/equity).toFixed(2)+'x' : '—';
  const roa = assets > 0 ? ((income/assets)*100).toFixed(2)+'%' : '—';
  set('roe_val', roe);
  set('roe_npm', npm);
  set('roe_at', at);
  set('roe_em', em);
  set('roe_roa', roa);
  showResult('roe_res');
}

const ucUnits = {
  length: { m:'Meters',km:'Kilometers',cm:'Centimeters',mm:'Millimeters',mi:'Miles',yd:'Yards',ft:'Feet',in:'Inches' },
  weight: { kg:'Kilograms',g:'Grams',lb:'Pounds',oz:'Ounces',t:'Metric Tons' },
  temperature: { c:'Celsius',f:'Fahrenheit',k:'Kelvin' },
  area: { m2:'m²',km2:'km²',ha:'Hectares',ac:'Acres',ft2:'ft²',mi2:'mi²' },
  volume: { l:'Liters',ml:'Milliliters',m3:'m³',gal:'Gallons (US)',qt:'Quarts',pt:'Pints',cup:'Cups',fl_oz:'fl oz' },
  speed: { mps:'m/s',kph:'km/h',mph:'mph',knot:'Knots' }
};
const ucToBase = {
  m:1,km:1000,cm:0.01,mm:0.001,mi:1609.344,yd:0.9144,ft:0.3048,in:0.0254,
  kg:1,g:0.001,lb:0.453592,oz:0.0283495,t:1000,
  m2:1,km2:1e6,ha:10000,ac:4046.86,ft2:0.0929,mi2:2.59e6,
  l:1,ml:0.001,m3:1000,gal:3.78541,qt:0.946353,pt:0.473176,cup:0.236588,fl_oz:0.0295735,
  mps:1,kph:0.277778,mph:0.44704,knot:0.514444
};
function updateUCUnits() {
  const cat = document.getElementById('uc_cat').value;
  const units = ucUnits[cat];
  const fromSel = document.getElementById('uc_from'), toSel = document.getElementById('uc_to');
  fromSel.innerHTML = toSel.innerHTML = '';
  Object.entries(units).forEach(([k,v],i)=>{
    fromSel.innerHTML += `<option value="${k}"${i===0?' selected':''}>${v}</option>`;
    toSel.innerHTML += `<option value="${k}"${i===1?' selected':''}>${v}</option>`;
  });
}
function calcUnitConv() {
  const cat = document.getElementById('uc_cat').value;
  const v = num('uc_val');
  const from = document.getElementById('uc_from').value;
  const to = document.getElementById('uc_to').value;
  let result;
  if(cat==='temperature') {
    let celsius;
    if(from==='c') celsius=v; else if(from==='f') celsius=(v-32)*5/9; else celsius=v-273.15;
    if(to==='c') result=celsius; else if(to==='f') result=celsius*9/5+32; else result=celsius+273.15;
  } else {
    result = v * ucToBase[from] / ucToBase[to];
  }
  const fromName = ucUnits[cat][from], toName = ucUnits[cat][to];
  set('uc_result', result.toPrecision(6)+' '+to.replace('2','²').replace('3','³'));
  set('uc_formula', `${v} ${fromName} = ${result.toPrecision(4)} ${toName}`);
  set('uc_reverse', `1 ${toName} = ${(1/result*v).toPrecision(4)} ${fromName}`);
  showResult('uc_res');
}
document.addEventListener('DOMContentLoaded', ()=>{ if(document.getElementById('uc_cat')) updateUCUnits(); });

function calcDateDiff() {
  const s = new Date(document.getElementById('dd_start').value);
  const e = new Date(document.getElementById('dd_end').value);
  if(isNaN(s)||isNaN(e)) return;
  const diff = e - s;
  const days = Math.round(diff / (1000*3600*24));
  const weeks = Math.floor(days/7);
  const months = Math.floor(days/30.44);
  const years = (days/365.25).toFixed(2);
  // Count business days
  let biz = 0, cur = new Date(s);
  while(cur <= e) { const d=cur.getDay(); if(d!==0&&d!==6) biz++; cur.setDate(cur.getDate()+1); }
  set('dd_days', days.toLocaleString()+' days');
  set('dd_weeks', weeks.toLocaleString()+' weeks');
  set('dd_months', months.toLocaleString()+' months');
  set('dd_years', years+' years');
  set('dd_biz', biz.toLocaleString()+' days');
  showResult('dd_res');
}

function calcFuelCost() {
  const dist = num('fc_dist'), eff = num('fc_eff'), price = num('fc_price');
  const pax = num('fc_pax'), trips = num('fc_trips');
  const liters = dist / eff;
  const tripCost = liters * price;
  const perPax = tripCost / pax;
  const monthly = tripCost * trips;
  const annual = monthly * 12;
  set('fc_trip', '$'+tripCost.toFixed(2));
  set('fc_liters', liters.toFixed(2)+' L');
  set('fc_perpax', '$'+perPax.toFixed(2));
  set('fc_monthly', '$'+monthly.toFixed(2));
  set('fc_annual', '$'+annual.toFixed(2));
  showResult('fc_res');
}

function calcElecBill() {
  const rate = num('elec_rate');
  const rows = document.querySelectorAll('.elec-row');
  let totalKwhDay = 0;
  rows.forEach(r => {
    const w = parseFloat(r.querySelector('.elec-watts').value)||0;
    const h = parseFloat(r.querySelector('.elec-hrs').value)||0;
    totalKwhDay += (w * h) / 1000;
  });
  const dailyCost = totalKwhDay * rate;
  const monthly = dailyCost * 30;
  const annual = monthly * 12;
  const co2 = (totalKwhDay * 30 * 0.386).toFixed(1); // avg 0.386 kg CO2/kWh
  set('elec_mo', '$'+monthly.toFixed(2));
  set('elec_kwh', totalKwhDay.toFixed(2)+' kWh');
  set('elec_day', '$'+dailyCost.toFixed(2));
  set('elec_yr', '$'+annual.toFixed(2));
  set('elec_co2', co2+' kg');
  showResult('elec_res');
}

function calcTimeZone() {
  const timeStr = document.getElementById('tz_time').value;
  const offset = parseFloat(document.getElementById('tz_from').value);
  if(!timeStr) return;
  const [hh,mm] = timeStr.split(':').map(Number);
  const totalMin = hh*60 + mm - offset*60;
  const toUTC = t => { let m = ((t%1440)+1440)%1440; let h=Math.floor(m/60),mi=m%60; let ampm=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${mi<10?'0'+mi:mi} ${ampm}`; };
  const utcMin = ((hh*60+mm - offset*60)%1440+1440)%1440;
  set('tz_utc', toUTC(utcMin));
  set('tz_est', toUTC(utcMin + (-5*60)));
  set('tz_gmt', toUTC(utcMin + (0)));
  set('tz_ist', toUTC(utcMin + (5*60+30)));
  set('tz_jst', toUTC(utcMin + (9*60)));
  showResult('tz_res');
}

function calcInternetSpeed() {
  const mbps = num('isp_speed'), size = num('isp_size');
  const unit = parseInt(document.getElementById('isp_unit').value);
  const sizeMB = size * unit;
  const fmtT = secs => secs<60 ? secs.toFixed(1)+' sec' : secs<3600 ? (secs/60).toFixed(1)+' min' : (secs/3600).toFixed(2)+' hr';
  const calcSecs = speed => (sizeMB * 8) / speed; // size*8 = megabits
  set('isp_time', fmtT(calcSecs(mbps)));
  set('isp_25', fmtT(calcSecs(25)));
  set('isp_100', fmtT(calcSecs(100)));
  set('isp_gig', fmtT(calcSecs(1000)));
  set('isp_real', fmtT(calcSecs(mbps*0.7)));
  showResult('isp_res');
}

// ===== TYPING SPEED TEST =====
const TST_TEXT = "The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump! The five boxing wizards jump quickly. Sphinx of black quartz judge my vow.";
let tstInterval = null, tstSeconds = 60, tstRunning = false;

function tstStart() {
  const inp = document.getElementById('tst_input');
  const btn = document.getElementById('tst_startbtn');
  if (!tstRunning && inp) {
    inp.disabled = false; inp.focus(); inp.value = '';
    tstSeconds = 60; tstRunning = true;
    const res = document.getElementById('tst_res');
    if(res) res.style.display = 'none';
    btn.textContent = 'Running...'; btn.disabled = true;
    tstInterval = setInterval(() => {
      tstSeconds--;
      const t = document.getElementById('tst_timer');
      if(t) t.textContent = tstSeconds + 's';
      if (tstSeconds <= 0) tstFinish();
    }, 1000);
  }
}
function tstTrack() { if (!tstRunning) return; }
function tstFinish() {
  clearInterval(tstInterval); tstRunning = false;
  const inp = document.getElementById('tst_input');
  if(inp) inp.disabled = true;
  const btn = document.getElementById('tst_startbtn');
  if(btn) { btn.textContent = 'Start'; btn.disabled = false; }
  const timer = document.getElementById('tst_timer');
  if(timer) timer.textContent = 'Done!';
  const typed = inp ? inp.value.trim() : '';
  const targetWords = TST_TEXT.trim().split(/\s+/);
  const typedWords = typed.split(/\s+/).filter(Boolean);
  let correct = 0, errors = 0;
  typedWords.forEach((w, i) => {
    if (i < targetWords.length && w === targetWords[i]) correct++;
    else errors++;
  });
  const grossWPM = typedWords.length;
  const netWPM = Math.max(0, grossWPM - errors);
  const acc = typedWords.length > 0 ? Math.round((correct / typedWords.length) * 100) : 0;
  const level = netWPM < 30 ? 'Beginner' : netWPM < 50 ? 'Average' : netWPM < 70 ? 'Good' : netWPM < 90 ? 'Fast' : 'Expert';
  set('tst_wpm', netWPM + ' WPM'); set('tst_gross', grossWPM + ' WPM');
  set('tst_acc', acc + '%'); set('tst_chars', typed.length + ' chars');
  set('tst_level', level);
  const res = document.getElementById('tst_res');
  if(res) res.style.display = 'block';
}
function tstReset() {
  clearInterval(tstInterval); tstRunning = false; tstSeconds = 60;
  const inp = document.getElementById('tst_input');
  if(inp) { inp.value = ''; inp.disabled = true; }
  const btn = document.getElementById('tst_startbtn');
  if(btn) { btn.textContent = '▶ Start'; btn.disabled = false; }
  const timer = document.getElementById('tst_timer');
  if(timer) timer.textContent = '60s';
  const res = document.getElementById('tst_res');
  if(res) res.style.display = 'none';
}

  var md = document.querySelector('meta[name="description"]');
  if(md) md.setAttribute('content', post.exc);
  history.pushState({blog:pid}, '', '/blog/' + pid);
  var cid = post.cat === 'Finance' ? 'finance' : post.cat === 'Health' ? 'health' : 'creator';
  var cat = null;
  for(var j=0;j<categories.length;j++){ if(categories[j].id===cid){cat=categories[j];break;} }
  var chips = cat ? cat.calcs.slice(0,4).map(function(c){ var s=slug(c); return '<button class="chip" onclick="openCalc(\'' + s + '\',\'' + c.replace(/'/g,'') + '\',\'' + cat.name + '\',\'' + cat.icon + '\')">' + c + '</button>'; }).join('') : '';
  bp.innerHTML = '<button class="b-back" onclick="showBlogList()">&larr; Back to Blog</button><div class="b-post"><div class="b-tag">' + post.cat + '</div><h1 class="b-h1">' + post.title + '</h1><div class="b-pmeta"><span>📅 ' + post.dt + '</span><span>⏱ ' + post.rt + '</span><span>✍️ CalculatorHub</span></div>' + post.body + (chips ? '<div class="rel-box"><h3>Try These Free Calculators</h3><div class="chips">' + chips + '</div></div>' : '') + '</div>';
  window.scrollTo(0,0);
}

function loadBlogById(bid) {
  if(!bid || bid === 'list') { showBlogList(); return; }
  for(var i=0;i<BP.length;i++){ if(BP[i].id===bid){ showBlogPost(bid); return; } }
  goHome();
}

</script>
